pre-commit:
  parallel: true
  jobs:
    - name: oxfmt
      glob: "*.{ts,tsx,js,jsx,json,css,md,html}"
      run: pnpm oxfmt {staged_files}
      stage_fixed: true

    - name: oxlint
      glob: "*.{ts,tsx,js,jsx}"
      # --no-error-on-unmatched-pattern: when {staged_files} is empty
      # (glob matched nothing) or every staged file is in oxlint's ignore
      # list (e.g. generated files under lib/bin/), oxlint would otherwise
      # exit 1 with "No files found to lint" and block the commit.
      run: pnpm oxlint --no-error-on-unmatched-pattern {staged_files}

    - name: cargo-fmt
      glob: "*.rs"
      run: cargo fmt --all -- --check

    - name: clippy
      glob: "*.rs"
      run: cargo clippy --no-deps -- -D warnings

# =============================================================================
# Grida Canvas — Node Properties Catalog
# =============================================================================
#
# Reference-only catalog of every per-node property in the Grida Canvas data
# model. This file is authored by hand; it is NOT yet wired into codegen. Its
# purpose is to:
#
#   1. Provide a single auditable enumeration of every property a node can hold.
#   2. Establish stable numeric column ids that may later drive codegen,
#      diffing, and wire formats.
#   3. Serve as a completeness check against the persistency schema
#      (format/grida.fbs).
#
# This catalog is intentionally runtime-agnostic. It describes WHAT properties
# a node has, their types, nullability, and how each maps to the on-disk
# FlatBuffers schema (`format/grida.fbs`). It does NOT assume any particular
# runtime representation, column store, or CRDT strategy — those choices are
# left to consumers.
#
# ─── Id stability rules ─────────────────────────────────────────────────────
#
#   (1) Ids are append-only. Never reuse an id.
#   (2) A column's `type` may not change once assigned.
#   (3) A column's `name` may be renamed, but the numeric `id` is the stable
#       reference for everything downstream (codegen, binary layout, migration).
#   (4) Retired columns remain in this file with `retired = true`. A tombstoned
#       id MUST NOT be recycled.
#   (5) Additions go at the end of their logical group. If a group has no free
#       ids left, add at the next available global id.
#   (6) The FBS schema has its own per-table `(id:)` field numbers. Those are
#       local to each FBS table and are NOT expected to equal catalog ids.
#       `fbs_path` is the authoritative link back to FBS.
#
# ─── Type vocabulary ────────────────────────────────────────────────────────
#
# Types describe the logical shape of a column's value, not a specific storage
# class. Consumers map these to whatever backing representation they prefer.
#
#   f32             32-bit float scalar.
#   bool            1-bit / byte boolean.
#   u8              Unsigned 8-bit integer (commonly used for enum tags).
#   i32             Signed 32-bit integer.
#   string          UTF-8 string.
#   list<f32>       Variable-length list of f32.
#   paint_stack     Variable-length list of paint references into a document-
#                   level paint pool. Individual paint variant payloads live
#                   in the pool, not in the column.
#   vector_network  Opaque vector-network blob (mirrors the FBS
#                   `VectorNetworkData` table).
#   object          Variable-length / composite value that doesn't fit a
#                   scalar type. `object_shape` describes the TypeScript-ish
#                   shape for readers.
#
# Nullability is carried on each column as a separate `nullable` flag, not
# baked into the type name.
#
# ─── Applies-to vocabulary ──────────────────────────────────────────────────
#
#   Node type names are snake_case forms of the grida.fbs Node union variants:
#     scene, group, tray, initial_container, container, boolean_operation,
#     basic_shape, line, vector, path, text_span, attributed_text,
#     markdown_embed, unknown.
#
#   "basic_shape" covers Rectangle/Ellipse/Polygon/RegularPolygon/
#   RegularStarPolygon/Path node kinds, which all serialize to BasicShapeNode
#   with a CanonicalLayerShape union discriminator (shape_kind).
#
#   "*" means: all nodes — universally applicable via SystemNodeTrait.
#
# ─── default_semantic ───────────────────────────────────────────────────────
#
#   safe    The zero / default bit pattern is a correct logical default for
#           this property. Consumers may leave a cell uninitialized without
#           observable differences from an explicit default write.
#   unsafe  The zero bit pattern has a distinct logical meaning that is NOT
#           the desired default. Consumers must track presence explicitly
#           (e.g. via a separate presence bit, a nullable scalar, or an
#           eager write on node creation).
#
# =============================================================================

schema_version = 1
description = "Grida Canvas node properties catalog. Runtime-agnostic reference — not yet used for codegen."

# ─────────────────────────────────────────────────────────────────────────────
# Identity & system (SystemNodeTrait) — all nodes
# ─────────────────────────────────────────────────────────────────────────────

[[column]]
id = 1
name = "node_type"
type = "u8"
nullable = false
applies_to = ["*"]
fbs_path = "Node (union discriminator)"
default_semantic = "safe"
notes = "Discriminator for the grida.fbs `Node` union."

[[column]]
id = 2
name = "id"
type = "string"
nullable = false
applies_to = ["*"]
fbs_path = "SystemNodeTrait.id"
default_semantic = "safe"
notes = "FBS wraps this in NodeIdentifier (1-field table). Required in FBS."

[[column]]
id = 3
name = "name"
type = "string"
nullable = false
applies_to = ["*"]
fbs_path = "SystemNodeTrait.name"
default_semantic = "safe"
notes = "Empty string is a valid / default name."

[[column]]
id = 4
name = "active"
type = "bool"
nullable = false
applies_to = ["*"]
fbs_path = "SystemNodeTrait.active"
default_semantic = "safe"
notes = "FBS default = true."

[[column]]
id = 5
name = "locked"
type = "bool"
nullable = false
applies_to = ["*"]
fbs_path = "SystemNodeTrait.locked"
default_semantic = "safe"

# ─────────────────────────────────────────────────────────────────────────────
# Hierarchy
# ─────────────────────────────────────────────────────────────────────────────

[[column]]
id = 10
name = "parent"
type = "i32"
nullable = false
applies_to = ["*"]
fbs_path = "LayerTrait.parent.parent_id"
default_semantic = "safe"
notes = "Stored as an int slot index; -1 sentinel = root. FBS stores NodeIdentifier (string) inside ParentReference; runtime resolves to slot index. For SceneNode (which has no LayerTrait), runtime uses -1."

[[column]]
id = 11
name = "sort_key"
type = "string"
nullable = false
applies_to = ["*"]
fbs_path = "LayerTrait.parent.position / SceneNode.position"
default_semantic = "safe"
notes = "Fractional index string for sibling ordering. Empty string = unsorted / default."

[[column]]
id = 12
name = "deleted"
type = "bool"
nullable = false
applies_to = ["*"]
fbs_path = "none"
default_semantic = "safe"
notes = "Tombstone for LWW delete/undelete. Runtime/CRDT only — not serialized (snapshot excludes tombstoned nodes)."


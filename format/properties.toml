type = "string"
nullable = false
applies_to = ["path", "basic_shape"]
fbs_path = "PathNode.data / CanonicalShapePath.d"
default_semantic = "safe"
notes = "SVG path 'd' string. For BasicShapeNode this is carried via CanonicalShapePath (only when shape_kind = Path); for PathNode it's the sole geometry source. Empty string = no path."

[[column]]

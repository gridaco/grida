default_semantic = "safe"
notes = "FillRule: 0=NonZero, 1=EvenOdd. Also used by CanonicalShapePointsPolygon within BasicShape. Per-region fill rules (VectorNetworkRegion.region_fill_rule) are inside the vector_network blob."


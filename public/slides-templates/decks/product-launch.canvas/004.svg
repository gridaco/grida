<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1920 1080" width="1920" height="1080">
  <title>Everything in one surface</title>
  <rect width="1920" height="1080" fill="#F7F5EF"/>
  <rect x="0" y="0" width="26" height="1080" fill="#2323FF"/>
  <text x="160" y="240" font-family="'Space Grotesk','Arial Black',Arial,sans-serif" font-size="22" font-weight="700" fill="#2323FF" letter-spacing="5">CAPABILITY 01</text>
  <text font-family="'Space Grotesk','Arial Black',Arial,sans-serif" font-weight="700" fill="#2323FF" letter-spacing="-6" fill-opacity="0.12">
    <tspan x="1300" y="900" font-size="520">01</tspan>
  </text>
  <text font-family="'Space Grotesk','Arial Black',Arial,sans-serif" font-weight="700" fill="#0D0D0D" letter-spacing="-4">
    <tspan x="156" y="470" font-size="128">One surface.</tspan>
    <tspan x="156" y="610" font-size="128">Everything</tspan>
    <tspan x="156" y="750" font-size="128">in reach.</tspan>
  </text>
  <text x="160" y="850" font-family="'Space Grotesk','Inter',Arial,sans-serif" font-size="28" font-weight="500" fill="#0D0D0D" fill-opacity="0.7">Notes, tasks, and data share one fast canvas — no switching, no syncing, no waiting.</text>
  <line x1="160" y1="980" x2="1760" y2="980" stroke="rgba(13,13,13,0.15)" stroke-width="1"/>
  <text x="160" y="1016" font-family="'Space Grotesk','Inter',Arial,sans-serif" font-size="17" font-weight="700" fill="#0D0D0D" fill-opacity="0.55" letter-spacing="1">ORBIT ONE — PRODUCT LAUNCH</text>
  <text x="1760" y="1016" text-anchor="end" font-family="'Space Grotesk','Inter',Arial,sans-serif" font-size="17" font-weight="500" fill="rgba(13,13,13,0.4)" letter-spacing="1">04 / 09</text>
</svg>

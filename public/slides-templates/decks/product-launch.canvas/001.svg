<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1920 1080" width="1920" height="1080">
  <title>Cover</title>
  <defs>
    <pattern id="halftone" width="26" height="26" patternUnits="userSpaceOnUse">
      <circle cx="6" cy="6" r="4" fill="#0D0D0D" fill-opacity="0.18"/>
    </pattern>
  </defs>
  <rect width="1920" height="1080" fill="#2323FF"/>
  <rect x="1360" y="0" width="560" height="1080" fill="url(#halftone)"/>
  <rect x="160" y="150" width="120" height="10" fill="#F2FF49"/>
  <text x="160" y="228" font-family="'Space Grotesk','Arial Black',Arial,sans-serif" font-size="22" font-weight="700" fill="#F2FF49" letter-spacing="5">NOW LAUNCHING</text>
  <text font-family="'Space Grotesk','Arial Black',Arial,sans-serif" font-weight="700" fill="#F7F5EF" letter-spacing="-9">
    <tspan x="152" y="560" font-size="280">ORBIT</tspan>
  </text>
  <text x="160" y="700" font-family="'Space Grotesk','Arial Black',Arial,sans-serif" font-size="150" font-weight="700" fill="#FF3D7F" letter-spacing="-6">ONE.</text>
  <text x="160" y="840" font-family="'Space Grotesk','Inter',Arial,sans-serif" font-size="34" font-weight="500" fill="rgba(247,245,239,0.9)">The workspace that finally keeps up with you.</text>
  <line x1="160" y1="980" x2="1760" y2="980" stroke="rgba(247,245,239,0.25)" stroke-width="1"/>
  <text x="160" y="1016" font-family="'Space Grotesk','Inter',Arial,sans-serif" font-size="17" font-weight="700" fill="rgba(247,245,239,0.9)" letter-spacing="1">grida.co</text>
  <text x="1760" y="1016" text-anchor="end" font-family="'Space Grotesk','Inter',Arial,sans-serif" font-size="17" font-weight="500" fill="rgba(247,245,239,0.6)" letter-spacing="1">PRODUCT LAUNCH</text>
</svg>

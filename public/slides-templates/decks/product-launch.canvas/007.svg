<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1920 1080" width="1920" height="1080">
  <title>What early teams say</title>
  <rect width="1920" height="1080" fill="#F7F5EF"/>
  <text x="160" y="240" font-family="'Space Grotesk','Arial Black',Arial,sans-serif" font-size="22" font-weight="700" fill="#FF3D7F" letter-spacing="5">EARLY TEAMS</text>
  <text x="120" y="560" font-family="'Space Grotesk','Arial Black',Arial,sans-serif" font-size="440" font-weight="700" fill="#FF3D7F" fill-opacity="0.18">&#8220;</text>
  <text font-family="'Space Grotesk','Arial Black',Arial,sans-serif" font-weight="700" fill="#0D0D0D" letter-spacing="-3">
    <tspan x="156" y="470" font-size="86">We cut four apps in a week</tspan>
    <tspan x="156" y="575" font-size="86">and never looked back.</tspan>
    <tspan x="156" y="680" font-size="86">Orbit just <tspan fill="#2323FF">gets it.</tspan></tspan>
  </text>
  <text x="160" y="800" font-family="'Space Grotesk','Inter',Arial,sans-serif" font-size="26" font-weight="700" fill="#0D0D0D">JORDAN LEE</text>
  <text x="160" y="838" font-family="'Space Grotesk','Inter',Arial,sans-serif" font-size="24" font-weight="400" fill="#0D0D0D" fill-opacity="0.6">Head of Operations, Northwind Studio</text>
  <line x1="160" y1="980" x2="1760" y2="980" stroke="rgba(13,13,13,0.15)" stroke-width="1"/>
  <text x="160" y="1016" font-family="'Space Grotesk','Inter',Arial,sans-serif" font-size="17" font-weight="700" fill="#0D0D0D" fill-opacity="0.55" letter-spacing="1">ORBIT ONE — PRODUCT LAUNCH</text>
  <text x="1760" y="1016" text-anchor="end" font-family="'Space Grotesk','Inter',Arial,sans-serif" font-size="17" font-weight="500" fill="rgba(13,13,13,0.4)" letter-spacing="1">07 / 09</text>
</svg>

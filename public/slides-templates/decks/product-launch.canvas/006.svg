<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1920 1080" width="1920" height="1080">
  <title>It learns your work</title>
  <defs>
    <pattern id="halftone2" width="28" height="28" patternUnits="userSpaceOnUse">
      <circle cx="7" cy="7" r="4.5" fill="#0D0D0D" fill-opacity="0.16"/>
    </pattern>
  </defs>
  <rect width="1920" height="1080" fill="#F2FF49"/>
  <rect x="0" y="0" width="1920" height="200" fill="url(#halftone2)"/>
  <text x="160" y="270" font-family="'Space Grotesk','Arial Black',Arial,sans-serif" font-size="22" font-weight="700" fill="#0D0D0D" letter-spacing="5">THE DIFFERENCE</text>
  <text font-family="'Space Grotesk','Arial Black',Arial,sans-serif" font-weight="700" fill="#0D0D0D" letter-spacing="-8">
    <tspan x="150" y="560" font-size="248">It learns</tspan>
    <tspan x="150" y="790" font-size="248">your work.</tspan>
  </text>
  <path d="M 160 880 L 660 880 M 660 880 L 628 852 M 660 880 L 628 908" fill="none" stroke="#FF3D7F" stroke-width="10" stroke-linecap="square"/>
  <text x="700" y="895" font-family="'Space Grotesk','Inter',Arial,sans-serif" font-size="30" font-weight="700" fill="#0D0D0D">Orbit anticipates the next step before you ask.</text>
  <line x1="160" y1="980" x2="1760" y2="980" stroke="rgba(13,13,13,0.2)" stroke-width="1"/>
  <text x="160" y="1016" font-family="'Space Grotesk','Inter',Arial,sans-serif" font-size="17" font-weight="700" fill="#0D0D0D" fill-opacity="0.65" letter-spacing="1">ORBIT ONE — PRODUCT LAUNCH</text>
  <text x="1760" y="1016" text-anchor="end" font-family="'Space Grotesk','Inter',Arial,sans-serif" font-size="17" font-weight="500" fill="rgba(13,13,13,0.45)" letter-spacing="1">06 / 09</text>
</svg>

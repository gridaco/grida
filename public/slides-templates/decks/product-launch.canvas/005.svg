<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1920 1080" width="1920" height="1080">
  <title>Fast enough to disappear</title>
  <rect width="1920" height="1080" fill="#0D0D0D"/>
  <rect x="0" y="0" width="26" height="1080" fill="#F2FF49"/>
  <text x="160" y="240" font-family="'Space Grotesk','Arial Black',Arial,sans-serif" font-size="22" font-weight="700" fill="#F2FF49" letter-spacing="5">CAPABILITY 02</text>
  <text font-family="'Space Grotesk','Arial Black',Arial,sans-serif" font-weight="700" fill="#F2FF49" letter-spacing="-6" fill-opacity="0.10">
    <tspan x="1300" y="900" font-size="520">02</tspan>
  </text>
  <text font-family="'Space Grotesk','Arial Black',Arial,sans-serif" font-weight="700" fill="#F7F5EF" letter-spacing="-5">
    <tspan x="156" y="500" font-size="152">So fast it</tspan>
    <tspan x="156" y="660" font-size="152">disappears.</tspan>
  </text>
  <text x="160" y="820" font-family="'Space Grotesk','Inter',Arial,sans-serif" font-size="30" font-weight="500" fill="rgba(247,245,239,0.85)">Zero-lag typing, instant search, and a canvas that never blinks — <tspan fill="#F2FF49" font-weight="700">16ms</tspan> frames, every time.</text>
  <line x1="160" y1="980" x2="1760" y2="980" stroke="rgba(247,245,239,0.18)" stroke-width="1"/>
  <text x="160" y="1016" font-family="'Space Grotesk','Inter',Arial,sans-serif" font-size="17" font-weight="700" fill="rgba(247,245,239,0.7)" letter-spacing="1">ORBIT ONE — PRODUCT LAUNCH</text>
  <text x="1760" y="1016" text-anchor="end" font-family="'Space Grotesk','Inter',Arial,sans-serif" font-size="17" font-weight="500" fill="rgba(247,245,239,0.45)" letter-spacing="1">05 / 09</text>
</svg>

<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1920 1080" width="1920" height="1080">
  <title>Market size</title>
  <rect width="1920" height="1080" fill="#0A0A0B"/>
  <text x="160" y="250" font-family="'Inter','Helvetica Neue',Arial,sans-serif" font-size="20" font-weight="700" fill="#C9A227" letter-spacing="5">MARKET</text>
  <text x="160" y="330" font-family="'Inter','Helvetica Neue',Arial,sans-serif" font-size="28" font-weight="400" fill="rgba(237,234,227,0.55)">Global spend on work-management software, and growing every year.</text>
  <text x="152" y="720" font-family="'Playfair Display',Georgia,'Times New Roman',serif" font-size="300" font-weight="700" fill="#EDEAE3" letter-spacing="-6">$48B</text>
  <line x1="160" y1="800" x2="900" y2="800" stroke="rgba(237,234,227,0.15)" stroke-width="1"/>
  <text font-family="'Inter','Helvetica Neue',Arial,sans-serif" font-size="26" font-weight="400" fill="rgba(237,234,227,0.55)">
    <tspan x="160" y="862">Total addressable market by 2030 &#8212; we win by owning the</tspan>
    <tspan x="160" y="900">connective layer beneath it. Replace with your own sizing.</tspan>
  </text>
  <line x1="160" y1="980" x2="1760" y2="980" stroke="rgba(237,234,227,0.15)" stroke-width="1"/>
  <text x="160" y="1016" font-family="'Inter','Helvetica Neue',Arial,sans-serif" font-size="17" font-weight="600" fill="rgba(237,234,227,0.55)" letter-spacing="1">Startup Pitch</text>
  <text x="1760" y="1016" text-anchor="end" font-family="'Inter','Helvetica Neue',Arial,sans-serif" font-size="17" font-weight="500" fill="rgba(237,234,227,0.4)" letter-spacing="1">06 / 12</text>
</svg>

<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1920 1080" width="1920" height="1080">
  <title>Team</title>
  <rect width="1920" height="1080" fill="#0A0A0B"/>
  <text x="160" y="250" font-family="'Inter','Helvetica Neue',Arial,sans-serif" font-size="20" font-weight="700" fill="#C9A227" letter-spacing="5">TEAM</text>
  <text x="160" y="360" font-family="'Playfair Display',Georgia,'Times New Roman',serif" font-size="72" font-weight="700" fill="#EDEAE3" letter-spacing="-1">Built by people who lived the problem.</text>
  <line x1="160" y1="440" x2="1760" y2="440" stroke="rgba(237,234,227,0.15)" stroke-width="1"/>
  <g font-family="'Inter','Helvetica Neue',Arial,sans-serif">
    <circle cx="200" cy="580" r="8" fill="#C9A227"/>
    <text x="240" y="576" font-size="34" font-weight="700" fill="#EDEAE3">Ada Whitfield</text>
    <text x="240" y="618" font-size="24" font-weight="400" fill="rgba(237,234,227,0.55)">Co-founder &amp; CEO &#8212; ex-Head of Ops, scaled two SaaS teams.</text>

    <circle cx="200" cy="700" r="8" fill="#C9A227"/>
    <text x="240" y="696" font-size="34" font-weight="700" fill="#EDEAE3">Rory Nkemdirim</text>
    <text x="240" y="738" font-size="24" font-weight="400" fill="rgba(237,234,227,0.55)">Co-founder &amp; CTO &#8212; built data platforms at cloud scale.</text>

    <circle cx="200" cy="820" r="8" fill="#C9A227"/>
    <text x="240" y="816" font-size="34" font-weight="700" fill="#EDEAE3">Mei Sato</text>
    <text x="240" y="858" font-size="24" font-weight="400" fill="rgba(237,234,227,0.55)">Head of Product &#8212; shipped work tools used by millions.</text>
  </g>
  <line x1="160" y1="980" x2="1760" y2="980" stroke="rgba(237,234,227,0.15)" stroke-width="1"/>
  <text x="160" y="1016" font-family="'Inter','Helvetica Neue',Arial,sans-serif" font-size="17" font-weight="600" fill="rgba(237,234,227,0.55)" letter-spacing="1">Startup Pitch</text>
  <text x="1760" y="1016" text-anchor="end" font-family="'Inter','Helvetica Neue',Arial,sans-serif" font-size="17" font-weight="500" fill="rgba(237,234,227,0.4)" letter-spacing="1">10 / 12</text>
</svg>

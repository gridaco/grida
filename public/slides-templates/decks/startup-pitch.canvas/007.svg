<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1920 1080" width="1920" height="1080">
  <title>Traction</title>
  <rect width="1920" height="1080" fill="#0A0A0B"/>
  <text x="160" y="250" font-family="'Inter','Helvetica Neue',Arial,sans-serif" font-size="20" font-weight="700" fill="#C9A227" letter-spacing="5">TRACTION</text>
  <text x="160" y="330" font-family="'Playfair Display',Georgia,'Times New Roman',serif" font-size="68" font-weight="700" fill="#EDEAE3" letter-spacing="-1">Annual recurring revenue</text>
  <text x="160" y="382" font-family="'Inter','Helvetica Neue',Arial,sans-serif" font-size="24" font-weight="400" fill="rgba(237,234,227,0.55)">Up and to the right &#8212; swap in your own figures.</text>

  <g font-family="'Inter','Helvetica Neue',Arial,sans-serif">
    <rect x="320" y="712" width="200" height="108" fill="#EDEAE3" opacity="0.28"/>
    <rect x="640" y="628" width="200" height="192" fill="#EDEAE3" opacity="0.42"/>
    <rect x="960" y="512" width="200" height="308" fill="#EDEAE3" opacity="0.6"/>
    <rect x="1280" y="376" width="200" height="444" fill="#C9A227"/>

    <text x="420" y="684" text-anchor="middle" font-size="32" font-weight="700" fill="#EDEAE3">$0.4M</text>
    <text x="740" y="600" text-anchor="middle" font-size="32" font-weight="700" fill="#EDEAE3">$1.2M</text>
    <text x="1060" y="484" text-anchor="middle" font-size="32" font-weight="700" fill="#EDEAE3">$3.6M</text>
    <text x="1380" y="348" text-anchor="middle" font-size="32" font-weight="700" fill="#C9A227">$8.1M</text>

    <line x1="280" y1="820" x2="1600" y2="820" stroke="rgba(237,234,227,0.3)" stroke-width="2"/>

    <text x="420" y="868" text-anchor="middle" font-size="23" font-weight="500" fill="rgba(237,234,227,0.55)">2023</text>
    <text x="740" y="868" text-anchor="middle" font-size="23" font-weight="500" fill="rgba(237,234,227,0.55)">2024</text>
    <text x="1060" y="868" text-anchor="middle" font-size="23" font-weight="500" fill="rgba(237,234,227,0.55)">2025</text>
    <text x="1380" y="868" text-anchor="middle" font-size="23" font-weight="700" fill="#EDEAE3">2026</text>
  </g>

  <line x1="160" y1="980" x2="1760" y2="980" stroke="rgba(237,234,227,0.15)" stroke-width="1"/>
  <text x="160" y="1016" font-family="'Inter','Helvetica Neue',Arial,sans-serif" font-size="17" font-weight="600" fill="rgba(237,234,227,0.55)" letter-spacing="1">Startup Pitch</text>
  <text x="1760" y="1016" text-anchor="end" font-family="'Inter','Helvetica Neue',Arial,sans-serif" font-size="17" font-weight="500" fill="rgba(237,234,227,0.4)" letter-spacing="1">07 / 12</text>
</svg>

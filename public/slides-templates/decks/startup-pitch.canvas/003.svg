<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1920 1080" width="1920" height="1080">
  <title>Why now</title>
  <rect width="1920" height="1080" fill="#0A0A0B"/>
  <text x="160" y="250" font-family="'Inter','Helvetica Neue',Arial,sans-serif" font-size="20" font-weight="700" fill="#C9A227" letter-spacing="5">WHY NOW</text>
  <text font-family="'Playfair Display',Georgia,'Times New Roman',serif" font-size="72" font-weight="700" fill="#EDEAE3" letter-spacing="-1">
    <tspan x="158" y="430">The ground just shifted</tspan>
    <tspan x="158" y="520">under every workflow.</tspan>
  </text>
  <line x1="160" y1="600" x2="900" y2="600" stroke="rgba(237,234,227,0.15)" stroke-width="1"/>
  <g font-family="'Inter','Helvetica Neue',Arial,sans-serif">
    <rect x="160" y="670" width="10" height="10" fill="#C9A227"/>
    <text x="196" y="680" font-size="27" font-weight="400" fill="#EDEAE3">AI made automating cross-tool work suddenly cheap and reliable.</text>
    <rect x="160" y="736" width="10" height="10" fill="#C9A227"/>
    <text x="196" y="746" font-size="27" font-weight="400" fill="#EDEAE3">Open APIs mean every system can now be a source, not a silo.</text>
    <rect x="160" y="802" width="10" height="10" fill="#C9A227"/>
    <text x="196" y="812" font-size="27" font-weight="400" fill="#EDEAE3">Buyers are consolidating &#8212; the market is finally ready to pay for one layer.</text>
  </g>
  <line x1="160" y1="980" x2="1760" y2="980" stroke="rgba(237,234,227,0.15)" stroke-width="1"/>
  <text x="160" y="1016" font-family="'Inter','Helvetica Neue',Arial,sans-serif" font-size="17" font-weight="600" fill="rgba(237,234,227,0.55)" letter-spacing="1">Startup Pitch</text>
  <text x="1760" y="1016" text-anchor="end" font-family="'Inter','Helvetica Neue',Arial,sans-serif" font-size="17" font-weight="500" fill="rgba(237,234,227,0.4)" letter-spacing="1">03 / 12</text>
</svg>

<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1920 1080" width="1920" height="1080">
  <title>The problem</title>
  <rect width="1920" height="1080" fill="#0A0A0B"/>
  <text x="160" y="250" font-family="'Inter','Helvetica Neue',Arial,sans-serif" font-size="20" font-weight="700" fill="#C9A227" letter-spacing="5">THE PROBLEM</text>
  <text font-family="'Playfair Display',Georgia,'Times New Roman',serif" font-size="72" font-weight="700" fill="#EDEAE3" letter-spacing="-1">
    <tspan x="158" y="430">Teams drown in tools</tspan>
    <tspan x="158" y="520">that don&#8217;t talk to each other.</tspan>
  </text>
  <line x1="160" y1="600" x2="900" y2="600" stroke="rgba(237,234,227,0.15)" stroke-width="1"/>
  <text font-family="'Inter','Helvetica Neue',Arial,sans-serif" font-size="28" font-weight="400" fill="#EDEAE3">
    <tspan x="160" y="690">The average company now runs on dozens of disconnected apps. Context</tspan>
    <tspan x="160" y="736">gets copy-pasted, status lives in five places, and no one trusts a single</tspan>
    <tspan x="160" y="782">number. The cost isn&#8217;t the software &#8212; it&#8217;s the hours lost reconciling it.</tspan>
  </text>
  <line x1="160" y1="980" x2="1760" y2="980" stroke="rgba(237,234,227,0.15)" stroke-width="1"/>
  <text x="160" y="1016" font-family="'Inter','Helvetica Neue',Arial,sans-serif" font-size="17" font-weight="600" fill="rgba(237,234,227,0.55)" letter-spacing="1">Startup Pitch</text>
  <text x="1760" y="1016" text-anchor="end" font-family="'Inter','Helvetica Neue',Arial,sans-serif" font-size="17" font-weight="500" fill="rgba(237,234,227,0.4)" letter-spacing="1">02 / 12</text>
</svg>

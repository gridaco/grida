<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1920 1080" width="1920" height="1080">
  <title>The solution</title>
  <rect width="1920" height="1080" fill="#0A0A0B"/>
  <text x="160" y="250" font-family="'Inter','Helvetica Neue',Arial,sans-serif" font-size="20" font-weight="700" fill="#C9A227" letter-spacing="5">THE SOLUTION</text>
  <text font-family="'Playfair Display',Georgia,'Times New Roman',serif" font-size="72" font-weight="700" fill="#EDEAE3" letter-spacing="-1">
    <tspan x="158" y="430">One system of record</tspan>
    <tspan x="158" y="520">that every tool feeds.</tspan>
  </text>
  <line x1="160" y1="600" x2="900" y2="600" stroke="rgba(237,234,227,0.15)" stroke-width="1"/>
  <text font-family="'Inter','Helvetica Neue',Arial,sans-serif" font-size="28" font-weight="400" fill="#EDEAE3">
    <tspan x="160" y="690">Northwind sits underneath your existing stack and syncs it into a single,</tspan>
    <tspan x="160" y="736">trusted source of truth. Your team keeps the apps they love &#8212; but status,</tspan>
    <tspan x="160" y="782">ownership, and metrics finally agree, automatically and in real time.</tspan>
  </text>
  <line x1="160" y1="980" x2="1760" y2="980" stroke="rgba(237,234,227,0.15)" stroke-width="1"/>
  <text x="160" y="1016" font-family="'Inter','Helvetica Neue',Arial,sans-serif" font-size="17" font-weight="600" fill="rgba(237,234,227,0.55)" letter-spacing="1">Startup Pitch</text>
  <text x="1760" y="1016" text-anchor="end" font-family="'Inter','Helvetica Neue',Arial,sans-serif" font-size="17" font-weight="500" fill="rgba(237,234,227,0.4)" letter-spacing="1">04 / 12</text>
</svg>

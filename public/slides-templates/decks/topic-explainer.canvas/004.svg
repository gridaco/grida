<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1920 1080" width="1920" height="1080">
  <title>Idea 01 — The core concept</title>
  <rect width="1920" height="1080" fill="#FAFAF8"/>
  <text x="150" y="620" font-family="'Inter','Helvetica Neue',Arial,sans-serif" font-size="440" font-weight="800" fill="#111111" letter-spacing="-20" opacity="0.06">01</text>
  <text x="160" y="250" font-family="'Inter','Helvetica Neue',Arial,sans-serif" font-size="20" font-weight="700" fill="#E5484D" letter-spacing="4">THE CORE CONCEPT</text>
  <text font-family="'Inter','Helvetica Neue',Arial,sans-serif" font-size="72" font-weight="800" fill="#111111" letter-spacing="-2">
    <tspan x="158" y="430">Start with the one thing</tspan>
    <tspan x="158" y="520">everything else rests on.</tspan>
  </text>
  <line x1="160" y1="600" x2="900" y2="600" stroke="rgba(17,17,17,0.12)" stroke-width="1"/>
  <text font-family="'Inter','Helvetica Neue',Arial,sans-serif" font-size="28" font-weight="400" fill="#111111">
    <tspan x="160" y="690">Before any of the moving parts make sense, there's a single idea</tspan>
    <tspan x="160" y="736">that holds the whole thing up. Name it plainly, in one sentence,</tspan>
    <tspan x="160" y="782">and the rest of the deck has something to attach to.</tspan>
  </text>
  <line x1="160" y1="980" x2="1760" y2="980" stroke="rgba(17,17,17,0.10)" stroke-width="1"/>
  <text x="160" y="1016" font-family="'Inter','Helvetica Neue',Arial,sans-serif" font-size="17" font-weight="600" fill="#8A8A82" letter-spacing="1">How it actually works</text>
  <text x="1760" y="1016" text-anchor="end" font-family="'Inter','Helvetica Neue',Arial,sans-serif" font-size="17" font-weight="500" fill="rgba(17,17,17,0.4)" letter-spacing="1">04 / 09</text>
</svg>

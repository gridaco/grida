<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1920 1080" width="1920" height="1080">
  <title>Why it matters</title>
  <rect width="1920" height="1080" fill="#FAFAF8"/>
  <text x="160" y="248" font-family="'Inter','Helvetica Neue',Arial,sans-serif" font-size="20" font-weight="700" fill="#8A8A82" letter-spacing="4">WHY IT MATTERS</text>
  <text font-family="'Inter','Helvetica Neue',Arial,sans-serif" font-size="82" font-weight="800" fill="#111111" letter-spacing="-2.5">
    <tspan x="158" y="470">Most people use it every day —</tspan>
    <tspan x="158" y="580">and almost no one can explain</tspan>
    <tspan x="158" y="690">what happens <tspan fill="#E5484D">underneath.</tspan></tspan>
  </text>
  <line x1="160" y1="980" x2="1760" y2="980" stroke="rgba(17,17,17,0.10)" stroke-width="1"/>
  <text x="160" y="1016" font-family="'Inter','Helvetica Neue',Arial,sans-serif" font-size="17" font-weight="600" fill="#8A8A82" letter-spacing="1">How it actually works</text>
  <text x="1760" y="1016" text-anchor="end" font-family="'Inter','Helvetica Neue',Arial,sans-serif" font-size="17" font-weight="500" fill="rgba(17,17,17,0.4)" letter-spacing="1">02 / 09</text>
</svg>

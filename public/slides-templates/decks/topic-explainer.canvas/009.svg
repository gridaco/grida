<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1920 1080" width="1920" height="1080">
  <title>The takeaway</title>
  <rect width="1920" height="1080" fill="#111111"/>
  <rect x="160" y="232" width="18" height="18" fill="#E5484D"/>
  <text x="200" y="248" font-family="'Inter','Helvetica Neue',Arial,sans-serif" font-size="20" font-weight="700" fill="rgba(250,250,248,0.6)" letter-spacing="4">THE TAKEAWAY</text>
  <text font-family="'Inter','Helvetica Neue',Arial,sans-serif" font-size="96" font-weight="800" fill="#FAFAF8" letter-spacing="-3">
    <tspan x="158" y="470">Now you can explain</tspan>
    <tspan x="158" y="580">it to someone else.</tspan>
  </text>

  <g font-family="'Inter','Helvetica Neue',Arial,sans-serif" fill="#FAFAF8">
    <text x="160" y="720" font-size="24" font-weight="700" fill="#E5484D">01</text>
    <text x="160" y="762" font-size="26" font-weight="400" fill="rgba(250,250,248,0.85)">One idea holds it up.</text>
    <text x="640" y="720" font-size="24" font-weight="700" fill="#E5484D">02</text>
    <text x="640" y="762" font-size="26" font-weight="400" fill="rgba(250,250,248,0.85)">The parts hand off in order.</text>
    <text x="1200" y="720" font-size="24" font-weight="700" fill="#E5484D">03</text>
    <text x="1200" y="762" font-size="26" font-weight="400" fill="rgba(250,250,248,0.85)">It breaks where it assumes.</text>
  </g>

  <line x1="160" y1="980" x2="1760" y2="980" stroke="rgba(250,250,248,0.15)" stroke-width="1"/>
  <text x="160" y="1016" font-family="'Inter','Helvetica Neue',Arial,sans-serif" font-size="17" font-weight="600" fill="rgba(250,250,248,0.6)" letter-spacing="1">grida.co</text>
  <text x="1760" y="1016" text-anchor="end" font-family="'Inter','Helvetica Neue',Arial,sans-serif" font-size="17" font-weight="500" fill="rgba(250,250,248,0.4)" letter-spacing="1">09 / 09</text>
</svg>

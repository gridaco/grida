<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1920 1080" width="1920" height="1080">
  <title>By the numbers</title>
  <rect width="1920" height="1080" fill="#FAFAF8"/>
  <text x="160" y="252" font-family="'Inter','Helvetica Neue',Arial,sans-serif" font-size="68" font-weight="800" fill="#111111" letter-spacing="-1.5">By the numbers</text>
  <text x="160" y="320" font-family="'Inter','Helvetica Neue',Arial,sans-serif" font-size="26" font-weight="400" fill="#8A8A82">Adoption climbs once the idea clicks — swap in your own figures.</text>

  <g font-family="'Inter','Helvetica Neue',Arial,sans-serif">
    <rect x="300" y="704" width="220" height="116" fill="#111111" opacity="0.85"/>
    <rect x="640" y="600" width="220" height="220" fill="#111111" opacity="0.85"/>
    <rect x="980" y="484" width="220" height="336" fill="#111111" opacity="0.85"/>
    <rect x="1320" y="360" width="220" height="460" fill="#E5484D"/>

    <text x="410" y="676" text-anchor="middle" font-size="34" font-weight="800" fill="#111111">18%</text>
    <text x="750" y="572" text-anchor="middle" font-size="34" font-weight="800" fill="#111111">34%</text>
    <text x="1090" y="456" text-anchor="middle" font-size="34" font-weight="800" fill="#111111">52%</text>
    <text x="1430" y="332" text-anchor="middle" font-size="34" font-weight="800" fill="#E5484D">71%</text>

    <line x1="260" y1="820" x2="1660" y2="820" stroke="#111111" stroke-width="2"/>

    <text x="410" y="868" text-anchor="middle" font-size="24" font-weight="500" fill="#8A8A82">Year 1</text>
    <text x="750" y="868" text-anchor="middle" font-size="24" font-weight="500" fill="#8A8A82">Year 2</text>
    <text x="1090" y="868" text-anchor="middle" font-size="24" font-weight="500" fill="#8A8A82">Year 3</text>
    <text x="1430" y="868" text-anchor="middle" font-size="24" font-weight="700" fill="#111111">Year 4</text>
  </g>

  <line x1="160" y1="980" x2="1760" y2="980" stroke="rgba(17,17,17,0.10)" stroke-width="1"/>
  <text x="160" y="1016" font-family="'Inter','Helvetica Neue',Arial,sans-serif" font-size="17" font-weight="600" fill="#8A8A82" letter-spacing="1">How it actually works</text>
  <text x="1760" y="1016" text-anchor="end" font-family="'Inter','Helvetica Neue',Arial,sans-serif" font-size="17" font-weight="500" fill="rgba(17,17,17,0.4)" letter-spacing="1">07 / 09</text>
</svg>

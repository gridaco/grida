<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1920 1080" width="1920" height="1080">
  <title>In one line</title>
  <rect width="1920" height="1080" fill="#FAFAF8"/>
  <text x="150" y="360" font-family="Georgia,'Times New Roman',serif" font-size="240" font-weight="700" fill="#E5484D">&#8220;</text>
  <text font-family="'Inter','Helvetica Neue',Arial,sans-serif" font-size="76" font-weight="800" fill="#111111" letter-spacing="-2">
    <tspan x="160" y="500">A good explanation isn't</tspan>
    <tspan x="160" y="600">simpler than the thing.</tspan>
    <tspan x="160" y="700">It's the thing, in order.</tspan>
  </text>
  <line x1="160" y1="790" x2="240" y2="790" stroke="#111111" stroke-width="4"/>
  <text x="270" y="802" font-family="'Inter','Helvetica Neue',Arial,sans-serif" font-size="26" font-weight="600" fill="#8A8A82" letter-spacing="1">the one line worth remembering</text>
  <line x1="160" y1="980" x2="1760" y2="980" stroke="rgba(17,17,17,0.10)" stroke-width="1"/>
  <text x="160" y="1016" font-family="'Inter','Helvetica Neue',Arial,sans-serif" font-size="17" font-weight="600" fill="#8A8A82" letter-spacing="1">How it actually works</text>
  <text x="1760" y="1016" text-anchor="end" font-family="'Inter','Helvetica Neue',Arial,sans-serif" font-size="17" font-weight="500" fill="rgba(17,17,17,0.4)" letter-spacing="1">08 / 09</text>
</svg>

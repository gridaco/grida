    <tspan x="158" y="670">make something</tspan>
    <tspan x="158" y="820">together.</tspan>
  </text>

  <!-- hand-drawn squiggle underline -->
  <path d="M162 862 C260 848 360 876 460 862 C560 848 660 876 760 862" fill="none" stroke="#EF7A6D" stroke-width="6" stroke-linecap="round"/>

  <text x="160" y="932" font-family="'Nunito Sans','Inter',Arial,sans-serif" font-size="30" font-weight="400" fill="#3A3A3A" opacity="0.85">A relaxed, hands-on session. Bring your curiosity — we&#8217;ll bring the rest.</text>

  <text x="1760" y="1016" text-anchor="end" font-family="'Nunito Sans','Inter',Arial,sans-serif" font-size="18" font-weight="600" fill="#3A3A3A" opacity="0.55" letter-spacing="1">Facilitated by [Your Name] · [Date]</text>
</svg>

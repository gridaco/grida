<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1920 1080" width="1920" height="1080">

  <title>Light slides - Big number</title>
<rect width="1920" height="1080" fill="#FAFAFA"/>
  <text x="160" y="260" font-family="'Helvetica Neue', sans-serif" font-size="20" font-weight="700" fill="rgba(10,10,10,0.55)" letter-spacing="3">A SINGLE METRIC</text>
  <text x="160" y="640" font-family="'Helvetica Neue', sans-serif" font-size="360" font-weight="800" fill="#0A0A0A" letter-spacing="-12">97%</text>
  <text font-family="'Helvetica Neue', sans-serif" font-size="28" font-weight="400" fill="rgba(10,10,10,0.55)">
    <tspan x="160" y="760">A short caption that gives the number its</tspan>
    <tspan x="160" y="800">context — what was measured, against what.</tspan>
  </text>
</svg>

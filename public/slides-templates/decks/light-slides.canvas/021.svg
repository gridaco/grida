<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1920 1080" width="1920" height="1080">

  <title>Light slides - Quote</title>
<rect width="1920" height="1080" fill="#FAFAFA"/>
  <text x="160" y="320" font-family="'Helvetica Neue', sans-serif" font-size="180" font-weight="800" fill="#0A0A0A" letter-spacing="-4" opacity="0.15">“</text>
  <text font-family="'Helvetica Neue', sans-serif" font-size="48" font-weight="500" fill="#0A0A0A" letter-spacing="-0.5">
    <tspan x="160" y="540">A short quote that captures the</tspan>
    <tspan x="160" y="600">essence of what you want to say.</tspan>
  </text>
  <text x="160" y="700" font-family="'Helvetica Neue', sans-serif" font-size="22" font-weight="400" fill="rgba(10,10,10,0.55)">— Author Name</text>
</svg>

<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1920 1080" width="1920" height="1080">

  <title>Light slides - Bar chart</title>
<rect width="1920" height="1080" fill="#FAFAFA"/>
  <text x="160" y="200" font-family="'Helvetica Neue', sans-serif" font-size="15" font-weight="700" fill="rgba(10,10,10,0.55)" letter-spacing="3">REVENUE — FY 2026</text>
  <text x="160" y="280" font-family="'Helvetica Neue', sans-serif" font-size="56" font-weight="800" fill="#0A0A0A" letter-spacing="-1.5">Quarterly growth</text>

  <g font-family="'Helvetica Neue', sans-serif" font-size="16" font-weight="400" fill="rgba(10,10,10,0.35)" letter-spacing="1">
    <text x="160" y="406" text-anchor="end">100</text>
    <text x="160" y="546" text-anchor="end">75</text>
    <text x="160" y="686" text-anchor="end">50</text>
    <text x="160" y="826" text-anchor="end">25</text>
  </g>

  <g stroke="rgba(10,10,10,0.12)" stroke-width="1">
    <line x1="200" y1="400" x2="1760" y2="400"/>
    <line x1="200" y1="540" x2="1760" y2="540"/>
    <line x1="200" y1="680" x2="1760" y2="680"/>
    <line x1="200" y1="820" x2="1760" y2="820"/>
  </g>
  <line x1="200" y1="820" x2="1760" y2="820" stroke="#0A0A0A" stroke-width="2"/>

  <g fill="#0A0A0A">
    <rect x="280" y="608" width="160" height="212"/>
    <rect x="520" y="496" width="160" height="324"/>
    <rect x="760" y="552" width="160" height="268"/>
    <rect x="1000" y="412" width="160" height="408"/>
    <rect x="1240" y="356" width="160" height="464"/>
    <rect x="1480" y="244" width="160" height="576"/>
  </g>

  <g font-family="'Helvetica Neue', sans-serif" font-size="20" font-weight="400" fill="rgba(10,10,10,0.55)" text-anchor="middle">
    <text x="360" y="880">Q1·24</text>
    <text x="600" y="880">Q2·24</text>
    <text x="840" y="880">Q3·24</text>
    <text x="1080" y="880">Q4·24</text>
    <text x="1320" y="880">Q1·25</text>
    <text x="1560" y="880">Q2·25</text>
  </g>

  <text x="160" y="980" font-family="'Helvetica Neue', sans-serif" font-size="18" font-weight="400" fill="rgba(10,10,10,0.35)">Source: internal billing — values normalized to Q1·24 = 25.</text>
</svg>

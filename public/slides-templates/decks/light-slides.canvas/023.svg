<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1920 1080" width="1920" height="1080">

  <title>Light slides - Timeline</title>
<rect width="1920" height="1080" fill="#FAFAFA"/>
  <text x="160" y="220" font-family="'Helvetica Neue', sans-serif" font-size="56" font-weight="800" fill="#0A0A0A" letter-spacing="-1.5">Timeline</text>
  <line x1="160" y1="280" x2="1760" y2="280" stroke="rgba(10,10,10,0.12)" stroke-width="1"/>

  <line x1="220" y1="600" x2="1700" y2="600" stroke="rgba(10,10,10,0.12)" stroke-width="2"/>
  <g font-family="'Helvetica Neue', sans-serif" fill="#0A0A0A">
    <circle cx="280" cy="600" r="10" fill="#0A0A0A"/>
    <text x="280" y="560" text-anchor="middle" font-size="18" font-weight="700" fill="rgba(10,10,10,0.55)" letter-spacing="2">Q1</text>
    <text x="280" y="660" text-anchor="middle" font-size="22" font-weight="700">Research</text>
    <text x="280" y="700" text-anchor="middle" font-size="18" font-weight="400" fill="rgba(10,10,10,0.55)">Talk to users</text>

    <circle cx="760" cy="600" r="10" fill="#0A0A0A"/>
    <text x="760" y="560" text-anchor="middle" font-size="18" font-weight="700" fill="rgba(10,10,10,0.55)" letter-spacing="2">Q2</text>
    <text x="760" y="660" text-anchor="middle" font-size="22" font-weight="700">Prototype</text>
    <text x="760" y="700" text-anchor="middle" font-size="18" font-weight="400" fill="rgba(10,10,10,0.55)">Ship to staging</text>

    <circle cx="1240" cy="600" r="10" fill="#0A0A0A"/>
    <text x="1240" y="560" text-anchor="middle" font-size="18" font-weight="700" fill="rgba(10,10,10,0.55)" letter-spacing="2">Q3</text>
    <text x="1240" y="660" text-anchor="middle" font-size="22" font-weight="700">Beta</text>
    <text x="1240" y="700" text-anchor="middle" font-size="18" font-weight="400" fill="rgba(10,10,10,0.55)">First 50 teams</text>

    <circle cx="1640" cy="600" r="14" fill="white" stroke="#0A0A0A" stroke-width="3"/>
    <text x="1640" y="560" text-anchor="middle" font-size="18" font-weight="700" fill="rgba(10,10,10,0.55)" letter-spacing="2">Q4</text>
    <text x="1640" y="660" text-anchor="middle" font-size="22" font-weight="700">GA</text>
    <text x="1640" y="700" text-anchor="middle" font-size="18" font-weight="400" fill="rgba(10,10,10,0.55)">Public launch</text>
  </g>
</svg>

<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1920 1080" width="1920" height="1080">

  <title>Light slides - Two columns</title>
<rect width="1920" height="1080" fill="#FAFAFA"/>
  <text x="160" y="220" font-family="'Helvetica Neue', sans-serif" font-size="56" font-weight="800" fill="#0A0A0A" letter-spacing="-1.5">Two columns</text>
  <line x1="160" y1="280" x2="1760" y2="280" stroke="rgba(10,10,10,0.12)" stroke-width="1"/>
  <text x="160" y="380" font-family="'Helvetica Neue', sans-serif" font-size="28" font-weight="700" fill="#0A0A0A">Column one</text>
  <text font-family="'Helvetica Neue', sans-serif" font-size="22" font-weight="400" fill="rgba(10,10,10,0.55)">
    <tspan x="160" y="440">A short paragraph that introduces the</tspan>
    <tspan x="160" y="476">first idea or topic on this slide.</tspan>
  </text>
  <text x="1040" y="380" font-family="'Helvetica Neue', sans-serif" font-size="28" font-weight="700" fill="#0A0A0A">Column two</text>
  <text font-family="'Helvetica Neue', sans-serif" font-size="22" font-weight="400" fill="rgba(10,10,10,0.55)">
    <tspan x="1040" y="440">A short paragraph that introduces the</tspan>
    <tspan x="1040" y="476">second idea or topic on this slide.</tspan>
  </text>
</svg>

<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1920 1080" width="1920" height="1080">

  <title>Light slides - Bullet list</title>
<rect width="1920" height="1080" fill="#FAFAFA"/>
  <text x="160" y="240" font-family="'Helvetica Neue', sans-serif" font-size="64" font-weight="800" fill="#0A0A0A" letter-spacing="-1.5">Key points</text>
  <line x1="160" y1="300" x2="1760" y2="300" stroke="rgba(10,10,10,0.12)" stroke-width="1"/>
  <g font-family="'Helvetica Neue', sans-serif" font-size="28" font-weight="400" fill="#0A0A0A">
    <circle cx="172" cy="410" r="5" fill="#0A0A0A"/>
    <text x="208" y="420">A first point that introduces the headline idea.</text>
    <circle cx="172" cy="490" r="5" fill="#0A0A0A"/>
    <text x="208" y="500">A second point that adds a supporting detail.</text>
    <circle cx="172" cy="570" r="5" fill="#0A0A0A"/>
    <text x="208" y="580">A third point that takes the argument forward.</text>
    <circle cx="172" cy="650" r="5" fill="#0A0A0A"/>
    <text x="208" y="660">A fourth point that lands the conclusion.</text>
  </g>
</svg>

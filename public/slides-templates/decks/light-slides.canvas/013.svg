<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1920 1080" width="1920" height="1080">

  <title>Light slides - Three columns</title>
<rect width="1920" height="1080" fill="#FAFAFA"/>
  <text x="160" y="220" font-family="'Helvetica Neue', sans-serif" font-size="56" font-weight="800" fill="#0A0A0A" letter-spacing="-1.5">Three columns</text>
  <line x1="160" y1="280" x2="1760" y2="280" stroke="rgba(10,10,10,0.12)" stroke-width="1"/>
  <g font-family="'Helvetica Neue', sans-serif">
    <text x="160" y="400" font-size="32" font-weight="700" fill="#0A0A0A">01</text>
    <text x="160" y="460" font-size="24" font-weight="700" fill="#0A0A0A">Discover</text>
    <text font-size="20" font-weight="400" fill="rgba(10,10,10,0.55)">
      <tspan x="160" y="510">Talk to people. Find</tspan>
      <tspan x="160" y="540">the real problem.</tspan>
    </text>

    <text x="720" y="400" font-size="32" font-weight="700" fill="#0A0A0A">02</text>
    <text x="720" y="460" font-size="24" font-weight="700" fill="#0A0A0A">Design</text>
    <text font-size="20" font-weight="400" fill="rgba(10,10,10,0.55)">
      <tspan x="720" y="510">Sketch the smallest</tspan>
      <tspan x="720" y="540">thing that could work.</tspan>
    </text>

    <text x="1280" y="400" font-size="32" font-weight="700" fill="#0A0A0A">03</text>
    <text x="1280" y="460" font-size="24" font-weight="700" fill="#0A0A0A">Deliver</text>
    <text font-size="20" font-weight="400" fill="rgba(10,10,10,0.55)">
      <tspan x="1280" y="510">Ship it. Learn what's</tspan>
      <tspan x="1280" y="540">actually true.</tspan>
    </text>
  </g>
</svg>

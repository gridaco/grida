<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1920 1080" width="1920" height="1080">

  <title>Light slides - Before / After</title>
<rect width="1920" height="1080" fill="#FAFAFA"/>
  <text x="160" y="220" font-family="'Helvetica Neue', sans-serif" font-size="56" font-weight="800" fill="#0A0A0A" letter-spacing="-1.5">Before / After</text>
  <line x1="160" y1="280" x2="1760" y2="280" stroke="rgba(10,10,10,0.12)" stroke-width="1"/>

  <text x="160" y="380" font-family="'Helvetica Neue', sans-serif" font-size="18" font-weight="700" fill="rgba(10,10,10,0.55)" letter-spacing="2">BEFORE</text>
  <rect x="160" y="410" width="720" height="420" fill="white" stroke="rgba(10,10,10,0.12)" stroke-width="1"/>
  <text font-family="'Helvetica Neue', sans-serif" font-size="22" font-weight="400" fill="rgba(10,10,10,0.55)">
    <tspan x="184" y="470">Describe the state of</tspan>
    <tspan x="184" y="506">the world before. Keep</tspan>
    <tspan x="184" y="542">it factual — not a strawman.</tspan>
  </text>

  <text x="960" y="620" text-anchor="middle" font-family="'Helvetica Neue', sans-serif" font-size="40" font-weight="800" fill="#0A0A0A">→</text>

  <text x="1040" y="380" font-family="'Helvetica Neue', sans-serif" font-size="18" font-weight="700" fill="#0A0A0A" letter-spacing="2">AFTER</text>
  <rect x="1040" y="410" width="720" height="420" fill="#0A0A0A"/>
  <text font-family="'Helvetica Neue', sans-serif" font-size="22" font-weight="400" fill="white">
    <tspan x="1064" y="470">Describe what changed,</tspan>
    <tspan x="1064" y="506">and the concrete payoff.</tspan>
    <tspan x="1064" y="542">Numbers help if you have them.</tspan>
  </text>
</svg>

<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1920 1080" width="1920" height="1080">

  <title>Light slides - Agenda</title>
<rect width="1920" height="1080" fill="#FAFAFA"/>
  <text x="160" y="220" font-family="'Helvetica Neue', sans-serif" font-size="56" font-weight="800" fill="#0A0A0A" letter-spacing="-1.5">Agenda</text>
  <line x1="160" y1="280" x2="1760" y2="280" stroke="rgba(10,10,10,0.12)" stroke-width="1"/>
  <g font-family="'Helvetica Neue', sans-serif" font-size="34" font-weight="500" fill="#0A0A0A">

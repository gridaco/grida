<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1920 1080" width="1920" height="1080">

  <title>Light slides - Three stats</title>
<rect width="1920" height="1080" fill="#FAFAFA"/>
  <text x="160" y="220" font-family="'Helvetica Neue', sans-serif" font-size="56" font-weight="800" fill="#0A0A0A" letter-spacing="-1.5">By the numbers</text>
  <line x1="160" y1="280" x2="1760" y2="280" stroke="rgba(10,10,10,0.12)" stroke-width="1"/>
  <g font-family="'Helvetica Neue', sans-serif">
    <text x="160" y="560" font-size="140" font-weight="800" fill="#0A0A0A" letter-spacing="-4">12×</text>
    <text x="160" y="620" font-size="22" font-weight="700" fill="#0A0A0A">Faster</text>
    <text font-size="20" font-weight="400" fill="rgba(10,10,10,0.55)">
      <tspan x="160" y="660">than the previous</tspan>
      <tspan x="160" y="690">render pipeline.</tspan>
    </text>

    <text x="720" y="560" font-size="140" font-weight="800" fill="#0A0A0A" letter-spacing="-4">2.4M</text>
    <text x="720" y="620" font-size="22" font-weight="700" fill="#0A0A0A">Frames</text>
    <text font-size="20" font-weight="400" fill="rgba(10,10,10,0.55)">
      <tspan x="720" y="660">rendered during</tspan>
      <tspan x="720" y="690">stress testing.</tspan>
    </text>

    <text x="1280" y="560" font-size="140" font-weight="800" fill="#0A0A0A" letter-spacing="-4">99.9%</text>
    <text x="1280" y="620" font-size="22" font-weight="700" fill="#0A0A0A">Pixel parity</text>
    <text font-size="20" font-weight="400" fill="rgba(10,10,10,0.55)">
      <tspan x="1280" y="660">with the reference</tspan>
      <tspan x="1280" y="690">implementation.</tspan>
    </text>
  </g>
</svg>

ht="500" fill="rgba(245,242,234,0.60)">grew the club from 12 to 120 members</text><line x1="136" y1="834" x2="1794" y2="834" stroke="rgba(245,242,234,0.12)" stroke-width="1"/><text x="136" y="914.5" font-family="'Inter Tight','Inter','Helvetica Neue',Arial,sans-serif" font-size="26" font-weight="800" fill="#FF5233">2023—</text><text x="326" y="902.5" font-family="'Inter','Helvetica Neue',Arial,sans-serif" font-size="28" font-weight="700" fill="#F5F2EA">Volunteer, Code the Change</text><text x="326" y="936.5" font-family="'Inter','Helvetica Neue',Arial,sans-serif" font-size="20" font-weight="500" fill="rgba(245,242,234,0.60)">taught weekend web workshops for teens</text>

<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1920 1080" width="1920" height="1080">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#f8f8fc" />
      <stop offset="100%" stop-color="#eeeef8" />
    </linearGradient>
    <linearGradient id="accent" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#1a1a2e" />
      <stop offset="100%" stop-color="#4a4a8a" />
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="1920" height="1080" fill="url(#bg)" />

  <!-- Decorative geometric shapes -->
  <circle cx="1680" cy="200" r="320" fill="none" stroke="#000000" stroke-width="1.5" stroke-opacity="0.06" />
  <circle cx="1680" cy="200" r="220" fill="none" stroke="#000000" stroke-width="1" stroke-opacity="0.06" />
  <circle cx="1680" cy="200" r="120" fill="#1a1a2e" fill-opacity="0.05" stroke="none" />

  <!-- Bottom-right subtle fill circle -->
  <circle cx="200" cy="980" r="260" fill="none" stroke="#000000" stroke-width="1" stroke-opacity="0.05" />

  <!-- Left accent bar (enriched gradient) -->
  <rect x="0" y="0" width="20" height="1080" fill="url(#accent)" />

  <!-- Horizontal rule -->
  <line x1="160" y1="680" x2="900" y2="680" stroke="#1a1a2e" stroke-width="2" stroke-opacity="0.15" />

  <!-- Eyebrow label -->
  <text x="160" y="380" font-family="ui-monospace, monospace" font-size="32" fill="#4a4a8a" fill-opacity="0.7" letter-spacing="6">DEMO PRESENTATION</text>

  <!-- Main title -->
  <text x="160" y="580" font-family="ui-sans-serif, system-ui, sans-serif" font-size="180" font-weight="800" fill="#0d0d1a" letter-spacing="-4">.canvas</text>

  <!-- Subtitle -->
  <text x="162" y="740" font-family="ui-sans-serif, system-ui, sans-serif" font-size="52" fill="#4a4a8a" letter-spacing="1">Slide 1 — Title</text>

  <!-- Bottom metadata -->
  <text x="160" y="980" font-family="ui-monospace, monospace" font-size="28" fill="#aaaaaa" letter-spacing="2">grida.co</text>
  <text x="1760" y="980" font-family="ui-monospace, monospace" font-size="28" fill="#aaaaaa" text-anchor="end" letter-spacing="2">1 / 3</text>
</svg>

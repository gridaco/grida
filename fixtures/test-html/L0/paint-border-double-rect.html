<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <title>Paint: Border Double (rectangular)</title>
    <style>
      html,
      body {
        min-height: 800px;
        box-sizing: border-box;
      }
      body {
        margin: 0;
        padding: 32px;
        background: #fff;
        color: #000;
        font-family: system-ui, sans-serif;
        font-size: 14px;
      }

      .label {
        font-size: 11px;
        color: #666;
        padding-bottom: 4px;
        width: 140px;
        height: 16px;
      }

      .grid {
        display: flex;
        flex-direction: row;
        flex-wrap: wrap;
        gap: 24px;
      }

      .box {
        width: 140px;
        height: 100px;
        background: #eee;
        box-sizing: border-box;
      }

      .b-9 {
        border: 9px double #000;
      }
      .b-12 {
        border: 12px double #c00;
      }
    </style>
  </head>
  <body>
    <div class="grid">
      <div>
        <div class="label">9px double black</div>
        <div class="box b-9"></div>
      </div>
      <div>
        <div class="label">12px double red</div>
        <div class="box b-12"></div>
      </div>
    </div>
  </body>
</html>

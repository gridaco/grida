<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <title>Paint: Transform Rotate</title>
    <style>
      html,
      body {
        min-height: 800px;
        box-sizing: border-box;
      }
      body {
        margin: 0;
        padding: 64px;
        background: #fff;
        color: #000;
        font-family: system-ui, sans-serif;
        font-size: 14px;
      }

      .label {
        font-size: 11px;
        color: #666;
        padding-bottom: 4px;
        width: 160px;
        height: 16px;
      }

      .grid {
        display: flex;
        flex-direction: row;
        flex-wrap: wrap;
        gap: 72px;
      }

      .frame {
        width: 120px;
        height: 120px;
        box-sizing: border-box;
      }

      .box {
        width: 120px;
        height: 120px;
        background: #000;
        box-sizing: border-box;
      }

      .r-90 {
        transform: rotate(90deg);
      }
      .r-180 {
        transform: rotate(180deg);
      }
      .r-270 {
        transform: rotate(-90deg);
      }
    </style>
  </head>
  <body>
    <div class="grid">
      <div>
        <div class="label">rotate 90deg</div>
        <div class="frame"><div class="box r-90"></div></div>
      </div>
      <div>
        <div class="label">rotate 180deg</div>
        <div class="frame"><div class="box r-180"></div></div>
      </div>
      <div>
        <div class="label">rotate -90deg</div>
        <div class="frame"><div class="box r-270"></div></div>
      </div>
    </div>
  </body>
</html>

<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <title>Paint: Filter blur()</title>
    <style>
      html,
      body {
        min-height: 800px;
        box-sizing: border-box;
      }
      body {
        margin: 0;
        padding: 48px;
        background: #fff;
      }

      .grid {
        display: flex;
        flex-direction: row;
        flex-wrap: wrap;
        gap: 56px;
      }

      .box {
        width: 80px;
        height: 80px;
        background: #000;
      }

      /* CSS Filter Effects §11.4.4 blur(<length>): the length is the
         Gaussian standard deviation directly. Zero = identity. */
      .b0 {
        filter: blur(0);
      }
      .b2 {
        filter: blur(2px);
      }
      .b4 {
        filter: blur(4px);
      }
      .b8 {
        filter: blur(8px);
      }
      .b12 {
        filter: blur(12px);
      }
      .b-colored {
        background: #c00;
        filter: blur(6px);
      }
    </style>
  </head>
  <body>
    <div class="grid">
      <div class="box b0"></div>
      <div class="box b2"></div>
      <div class="box b4"></div>
      <div class="box b8"></div>
      <div class="box b12"></div>
      <div class="box b-colored"></div>
    </div>
  </body>
</html>

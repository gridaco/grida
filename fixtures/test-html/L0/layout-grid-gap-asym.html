<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <title>Layout: Grid asymmetric row/column gaps</title>
    <style>
      html,
      body {
        min-height: 800px;
        box-sizing: border-box;
      }
      body {
        margin: 0;
        padding: 32px;
        background: #fff;
        color: #000;
        font-family: system-ui, sans-serif;
        font-size: 14px;
      }

      .grid {
        display: grid;
        grid-template-columns: 80px 80px 80px;
        grid-template-rows: 50px 50px 50px;
        row-gap: 24px;
        column-gap: 8px;
        width: 320px;
        padding: 8px;
        background: #eee;
        box-sizing: border-box;
      }

      .item {
        background: #000;
      }
      .red {
        background: #c00;
      }
    </style>
  </head>
  <body>
    <div class="grid">
      <div class="item"></div>
      <div class="item red"></div>
      <div class="item"></div>
      <div class="item red"></div>
      <div class="item"></div>
      <div class="item red"></div>
      <div class="item"></div>
      <div class="item red"></div>
      <div class="item"></div>
    </div>
  </body>
</html>

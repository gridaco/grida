<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <title>Paint: Transform Skew</title>
    <style>
      html,
      body {
        min-height: 800px;
        box-sizing: border-box;
      }
      body {
        margin: 0;
        padding: 64px;
        background: #fff;
        color: #000;
        font-family: system-ui, sans-serif;
        font-size: 14px;
      }

      .row {
        display: flex;
        gap: 48px;
      }

      .box {
        width: 80px;
        height: 80px;
        background: #000;
      }

      .skew-x {
        transform: skewX(20deg);
      }
      .skew-y {
        transform: skewY(10deg);
      }
      .skew-xy {
        transform: skew(15deg, 5deg);
      }
    </style>
  </head>
  <body>
    <div class="row">
      <div class="box skew-x"></div>
    </div>
  </body>
</html>

<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <title>Layout: Grid fractional (fr) tracks</title>
    <style>
      html,
      body {
        min-height: 800px;
        box-sizing: border-box;
      }
      body {
        margin: 0;
        padding: 32px;
        background: #fff;
        color: #000;
        font-family: system-ui, sans-serif;
        font-size: 14px;
      }

      .grid {
        display: grid;
        gap: 8px;
        height: 60px;
        background: #eee;
        margin-bottom: 24px;
        box-sizing: border-box;
      }

      .item {
        background: #000;
        height: 60px;
      }
      .red {
        background: #c00;
      }

      .a {
        grid-template-columns: 1fr 1fr 1fr;
        width: 304px; /* 3*96 + 2*8 = 304 → integer thirds */
      }
      .b {
        grid-template-columns: 1fr 2fr;
        width: 308px; /* 300 content + 8 gap; 100/200 split */
      }
      .c {
        grid-template-columns: 80px 1fr 80px;
        width: 300px;
      }
    </style>
  </head>
  <body>
    <div class="grid a">
      <div class="item"></div>
      <div class="item red"></div>
      <div class="item"></div>
    </div>
    <div class="grid b">
      <div class="item"></div>
      <div class="item red"></div>
    </div>
    <div class="grid c">
      <div class="item"></div>
      <div class="item red"></div>
      <div class="item"></div>
    </div>
  </body>
</html>

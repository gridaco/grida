<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <title>Layout: CSS logical properties (LTR horizontal-tb)</title>
    <!--
      In the default writing mode (horizontal-tb, LTR):
        inline-axis = horizontal (width, left↔right)
        block-axis  = vertical   (height, top↔bottom)

      So logical properties map 1:1 to physical, and Stylo resolves
      this during cascade. Verified by these panels rendering exactly
      as if they used the physical equivalents.
    -->
    <style>
      body {
        margin: 0;
        padding: 24px;
        background: #fff;
        color: #000;
        font-family: system-ui, sans-serif;
        font-size: 12px;
      }
      .label {
        font-size: 11px;
        color: #666;
        padding-bottom: 4px;
      }
      .grid {
        display: flex;
        flex-direction: row;
        flex-wrap: wrap;
        gap: 16px;
      }
      .anchor {
        position: relative;
        width: 180px;
        height: 120px;
        background: #f0f0f0;
      }
      .content {
        width: 180px;
        height: 40px;
        background: #f0f0f0;
      }

      /* Sizing */
      .size {
        inline-size: 140px;
        block-size: 80px;
        background: #3366cc;
      }
      .min-max {
        min-inline-size: 120px;
        block-size: 120px;
        max-block-size: 60px;
        background: #cc3366;
      }

      /* Inset (positioned) */
      .inset {
        position: absolute;
        inset-block-start: 20px;
        inset-inline-start: 40px;
        width: 40px;
        height: 40px;
        background: #ff0000;
      }

      /* Padding */
      .padding {
        padding-inline-start: 20px;
        padding-block-start: 10px;
        background: #cce;
      }

      /* Margin */
      .margin {
        margin-inline-start: 30px;
        margin-block-start: 8px;
        background: #9c9;
      }

      /* Border */
      .border {
        border-inline-start: 6px solid #0066cc;
        border-block-end: 4px solid #cc0066;
      }
    </style>
  </head>
  <body>
    <div class="grid">
      <div>
        <div class="label">inline-size / block-size</div>
        <div class="size"></div>
      </div>
      <div>
        <div class="label">min-inline-size / max-block-size</div>
        <div class="min-max"></div>
      </div>
      <div>
        <div class="label">inset-block-start / inset-inline-start</div>
        <div class="anchor"><div class="inset"></div></div>
      </div>
      <div>
        <div class="label">padding-inline-start / padding-block-start</div>
        <div class="content padding"></div>
      </div>
      <div>
        <div class="label">margin-inline-start / margin-block-start</div>
        <div class="content margin"></div>
      </div>
      <div>
        <div class="label">border-inline-start / border-block-end</div>
        <div class="content border"></div>
      </div>
    </div>
  </body>
</html>

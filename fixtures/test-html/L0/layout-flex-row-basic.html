<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <title>Layout: Flex Row Basic</title>
    <style>
      html,
      body {
        min-height: 800px;
        box-sizing: border-box;
      }
      body {
        margin: 0;
        padding: 32px;
        background: #fff;
        color: #000;
        font-family: system-ui, sans-serif;
        font-size: 14px;
      }

      .label {
        font-size: 11px;
        color: #666;
        padding-bottom: 4px;
        width: 180px;
        height: 16px;
      }

      .row {
        display: flex;
        flex-direction: row;
        width: 500px;
        height: 60px;
        background: #eee;
        margin-bottom: 24px;
        box-sizing: border-box;
      }

      .item {
        width: 80px;
        height: 60px;
        background: #000;
        box-sizing: border-box;
      }

      .gap-16 {
        gap: 16px;
      }
      .justify-between {
        justify-content: space-between;
      }
      .justify-end {
        justify-content: flex-end;
      }
    </style>
  </head>
  <body>
    <div class="label">default (start)</div>
    <div class="row">
      <div class="item"></div>
      <div class="item"></div>
      <div class="item"></div>
    </div>
    <div class="label">gap 16</div>
    <div class="row gap-16">
      <div class="item"></div>
      <div class="item"></div>
      <div class="item"></div>
    </div>
    <div class="label">justify-content: space-between</div>
    <div class="row justify-between">
      <div class="item"></div>
      <div class="item"></div>
      <div class="item"></div>
    </div>
    <div class="label">justify-content: flex-end</div>
    <div class="row justify-end">
      <div class="item"></div>
      <div class="item"></div>
      <div class="item"></div>
    </div>
  </body>
</html>

<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <title>Paint: Transform Origin</title>
    <style>
      html,
      body {
        min-height: 800px;
        box-sizing: border-box;
      }
      body {
        margin: 0;
        padding: 64px;
        background: #fff;
        color: #000;
        font-family: system-ui, sans-serif;
        font-size: 14px;
      }

      .grid {
        display: flex;
        flex-direction: row;
        flex-wrap: wrap;
        gap: 48px;
      }

      .frame {
        width: 120px;
        height: 120px;
        background: #eee;
        box-sizing: border-box;
      }

      .box {
        width: 120px;
        height: 120px;
        background: #000;
        box-sizing: border-box;
      }

      .tl-origin {
        transform: scale(0.5);
        transform-origin: 0 0;
      }
      .center {
        transform: scale(0.5);
        transform-origin: 50% 50%;
      }
      .br-origin {
        transform: scale(0.5);
        transform-origin: 100% 100%;
      }
    </style>
  </head>
  <body>
    <div class="grid">
      <div class="frame"><div class="box tl-origin"></div></div>
      <div class="frame"><div class="box center"></div></div>
      <div class="frame"><div class="box br-origin"></div></div>
    </div>
  </body>
</html>

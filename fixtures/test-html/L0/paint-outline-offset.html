<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <title>Paint: Outline Offset</title>
    <style>
      html,
      body {
        min-height: 800px;
        box-sizing: border-box;
      }
      body {
        margin: 0;
        padding: 40px;
        background: #fff;
        color: #000;
        font-family: system-ui, sans-serif;
        font-size: 14px;
      }

      .row {
        display: flex;
        gap: 40px;
      }

      .box {
        width: 80px;
        height: 80px;
        background: #000;
        box-sizing: border-box;
        outline: 4px solid #f00;
      }

      .offset-0 {
        outline-offset: 0;
      }
      .offset-8 {
        outline-offset: 8px;
      }
      .offset-16 {
        outline-offset: 16px;
      }
    </style>
  </head>
  <body>
    <div class="row">
      <div class="box offset-0"></div>
      <div class="box offset-8"></div>
      <div class="box offset-16"></div>
    </div>
  </body>
</html>

<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <title>Layout: Grid span placement</title>
    <style>
      html,
      body {
        min-height: 800px;
        box-sizing: border-box;
      }
      body {
        margin: 0;
        padding: 32px;
        background: #fff;
        color: #000;
        font-family: system-ui, sans-serif;
        font-size: 14px;
      }

      .grid {
        display: grid;
        grid-template-columns: 80px 80px 80px 80px;
        grid-template-rows: 50px 50px;
        gap: 8px;
        width: 352px;
        padding: 8px;
        background: #eee;
        box-sizing: border-box;
        margin-bottom: 24px;
      }

      .item {
        background: #000;
        box-sizing: border-box;
      }
      .red {
        background: #c00;
      }

      .span-2 {
        grid-column: span 2;
      }
      .span-3 {
        grid-column: span 3;
      }
      .row-span-2 {
        grid-row: span 2;
      }
    </style>
  </head>
  <body>
    <div class="grid">
      <div class="item span-2 red"></div>
      <div class="item"></div>
      <div class="item"></div>
      <div class="item"></div>
      <div class="item span-3 red"></div>
    </div>
    <div class="grid">
      <div class="item row-span-2 red"></div>
      <div class="item"></div>
      <div class="item"></div>
      <div class="item"></div>
      <div class="item"></div>
      <div class="item"></div>
      <div class="item"></div>
    </div>
  </body>
</html>

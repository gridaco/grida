<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <title>Transform: individual properties (translate/rotate/scale)</title>
    <style>
      body {
        margin: 0;
        padding: 24px;
        background: #fff;
        color: #000;
        font-family: system-ui, sans-serif;
        font-size: 12px;
      }
      .label {
        font-size: 11px;
        color: #666;
        padding-bottom: 4px;
      }
      .grid {
        display: flex;
        flex-direction: row;
        flex-wrap: wrap;
        gap: 32px;
      }
      .cell {
        width: 160px;
        height: 160px;
        display: flex;
        flex-direction: column;
      }
      .anchor {
        width: 100%;
        height: 140px;
        background: #f0f0f0;
        border: 1px solid #ccc;
      }
      .box {
        width: 40px;
        height: 40px;
        background: #e74c3c;
        margin: 20px;
      }
      .t-px {
        translate: 40px 20px;
      }
      .t-pct {
        translate: 50% 25%;
      }
      .r-deg {
        rotate: 30deg;
      }
      .r-rad {
        rotate: 0.5rad;
      }
      .s-uniform {
        scale: 1.5;
      }
      .s-xy {
        scale: 1.5 0.5;
      }
      .combined-trs {
        translate: 30px 10px;
        rotate: 20deg;
        scale: 1.2;
      }
      .with-transform {
        translate: 20px 0;
        rotate: 15deg;
        transform: scale(1.3);
      }
    </style>
  </head>
  <body>
    <div class="grid">
      <div class="cell">
        <div class="label">translate 40px 20px</div>
        <div class="anchor"><div class="box t-px"></div></div>
      </div>
      <div class="cell">
        <div class="label">translate 50% 25%</div>
        <div class="anchor"><div class="box t-pct"></div></div>
      </div>
      <div class="cell">
        <div class="label">rotate 30deg</div>
        <div class="anchor"><div class="box r-deg"></div></div>
      </div>
      <div class="cell">
        <div class="label">rotate 0.5rad</div>
        <div class="anchor"><div class="box r-rad"></div></div>
      </div>
      <div class="cell">
        <div class="label">scale 1.5</div>
        <div class="anchor"><div class="box s-uniform"></div></div>
      </div>
      <div class="cell">
        <div class="label">scale 1.5 0.5</div>
        <div class="anchor"><div class="box s-xy"></div></div>
      </div>
      <div class="cell">
        <div class="label">t + r + s combined</div>
        <div class="anchor"><div class="box combined-trs"></div></div>
      </div>
      <div class="cell">
        <div class="label">t + r + transform:scale</div>
        <div class="anchor"><div class="box with-transform"></div></div>
      </div>
    </div>
  </body>
</html>

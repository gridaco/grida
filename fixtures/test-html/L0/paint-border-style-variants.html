<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <title>
      Paint: border-style variants (double/groove/ridge/inset/outset)
    </title>
    <style>
      body {
        margin: 0;
        padding: 24px;
        background: #fff;
        color: #000;
        font-family: system-ui, sans-serif;
        font-size: 12px;
      }
      .label {
        font-size: 11px;
        color: #666;
        padding-bottom: 4px;
      }
      .grid {
        display: flex;
        flex-direction: row;
        flex-wrap: wrap;
        gap: 16px;
      }
      .rect {
        width: 120px;
        height: 80px;
        background: #e0e0e0;
        box-sizing: border-box;
      }
      .solid {
        border: 8px solid #333;
      }
      .double {
        border: 8px double #333;
      }
      .groove {
        border: 8px groove #cc3366;
      }
      .ridge {
        border: 8px ridge #cc3366;
      }
      .inset {
        border: 8px inset #3366cc;
      }
      .outset {
        border: 8px outset #3366cc;
      }
      .double-thin {
        border: 3px double #000;
      }
    </style>
  </head>
  <body>
    <div class="grid">
      <div>
        <div class="label">solid (baseline)</div>
        <div class="rect solid"></div>
      </div>
      <div>
        <div class="label">double</div>
        <div class="rect double"></div>
      </div>
      <div>
        <div class="label">groove</div>
        <div class="rect groove"></div>
      </div>
      <div>
        <div class="label">ridge</div>
        <div class="rect ridge"></div>
      </div>
      <div>
        <div class="label">inset</div>
        <div class="rect inset"></div>
      </div>
      <div>
        <div class="label">outset</div>
        <div class="rect outset"></div>
      </div>
      <div>
        <div class="label">double (thin)</div>
        <div class="rect double-thin"></div>
      </div>
    </div>
  </body>
</html>

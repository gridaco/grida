<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <title>Paint: Solid Outline</title>
    <style>
      html,
      body {
        min-height: 800px;
        box-sizing: border-box;
      }
      body {
        margin: 0;
        padding: 32px;
        background: #fff;
        color: #000;
        font-family: system-ui, sans-serif;
        font-size: 14px;
      }

      .label {
        font-size: 11px;
        color: #666;
        padding-bottom: 4px;
        width: 140px;
        height: 16px;
      }

      .grid {
        display: flex;
        flex-direction: row;
        flex-wrap: wrap;
        gap: 32px;
      }

      .box {
        width: 120px;
        height: 80px;
        background: #eee;
        box-sizing: border-box;
      }

      .w-1 {
        outline: 1px solid #000;
      }
      .w-3 {
        outline: 3px solid #000;
      }
      .w-6 {
        outline: 6px solid #000;
      }
      .colored {
        outline: 3px solid #c00;
      }
      .offset-pos {
        outline: 3px solid #000;
        outline-offset: 8px;
      }
    </style>
  </head>
  <body>
    <div class="grid">
      <div>
        <div class="label">1px solid</div>
        <div class="box w-1"></div>
      </div>
      <div>
        <div class="label">3px solid</div>
        <div class="box w-3"></div>
      </div>
      <div>
        <div class="label">6px solid</div>
        <div class="box w-6"></div>
      </div>
      <div>
        <div class="label">3px solid #c00</div>
        <div class="box colored"></div>
      </div>
      <div>
        <div class="label">offset +8</div>
        <div class="box offset-pos"></div>
      </div>
    </div>
  </body>
</html>

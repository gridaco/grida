<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <title>Paint: Box Shadow Multiple</title>
    <style>
      html,
      body {
        min-height: 800px;
        box-sizing: border-box;
      }
      body {
        margin: 0;
        padding: 64px;
        background: #fff;
        color: #000;
        font-family: system-ui, sans-serif;
        font-size: 14px;
      }

      .row {
        display: flex;
        gap: 64px;
        margin-bottom: 64px;
      }

      .box {
        width: 100px;
        height: 100px;
        background: #000;
        box-sizing: border-box;
      }

      .two {
        box-shadow:
          8px 8px 0 0 #f00,
          -8px -8px 0 0 #0f0;
      }

      .three {
        box-shadow:
          6px 6px 0 0 #f00,
          12px 12px 0 0 #0f0,
          18px 18px 0 0 #00f;
      }

      .inset-outer {
        box-shadow:
          10px 10px 0 0 #f00,
          inset 0 0 0 4px #0f0;
      }
    </style>
  </head>
  <body>
    <div class="row">
      <div class="box two"></div>
      <div class="box three"></div>
      <div class="box inset-outer"></div>
    </div>
  </body>
</html>

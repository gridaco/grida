<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <title>Paint: Aspect Ratio</title>
    <style>
      html,
      body {
        min-height: 800px;
        box-sizing: border-box;
      }
      body {
        margin: 0;
        padding: 32px;
        background: #fff;
        color: #000;
        font-family: system-ui, sans-serif;
        font-size: 14px;
      }

      .grid {
        display: flex;
        flex-direction: row;
        flex-wrap: wrap;
        gap: 24px;
      }

      .box {
        width: 160px;
        background: #000;
        box-sizing: border-box;
      }

      .r-1 {
        aspect-ratio: 1;
      }
      .r-16-9 {
        aspect-ratio: 16 / 9;
      }
      .r-4-3 {
        aspect-ratio: 4 / 3;
      }
    </style>
  </head>
  <body>
    <div class="grid">
      <div class="box r-1"></div>
      <div class="box r-16-9"></div>
      <div class="box r-4-3"></div>
    </div>
  </body>
</html>

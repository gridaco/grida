<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <title>Paint: Solid Background</title>
    <style>
      body {
        margin: 0;
        padding: 24px;
        background: #fff;
        color: #000;
        font-family: system-ui, sans-serif;
        font-size: 14px;
      }

      .label {
        font-size: 11px;
        color: #666;
        padding-bottom: 4px;
      }

      .grid {
        display: flex;
        flex-direction: row;
        flex-wrap: wrap;
        gap: 12px;
      }

      .swatch {
        width: 100px;
        height: 100px;
        display: flex;
        align-items: center;
        justify-content: center;
        font-size: 11px;
        color: #fff;
      }

      .hex6 {
        background-color: #f00;
      }
      .hex3 {
        background-color: #0f0;
      }
      .rgb {
        background-color: rgb(0, 0, 255);
      }
      .rgba {
        background-color: rgba(255, 0, 0, 0.7);
      }
      .named {
        background-color: dodgerblue;
      }
      .white {
        background-color: white;
        color: #000;
        border: 1px solid #000;
      }
    </style>
  </head>
  <body>
    <div class="grid">
      <div>
        <div class="label">#f00</div>
        <div class="swatch hex6">hex6</div>
      </div>
      <div>
        <div class="label">#0f0</div>
        <div class="swatch hex3">hex3</div>
      </div>
      <div>
        <div class="label">rgb(0,0,255)</div>
        <div class="swatch rgb">rgb</div>
      </div>
      <div>
        <div class="label">rgba(255,0,0,0.7)</div>
        <div class="swatch rgba">rgba</div>
      </div>
      <div>
        <div class="label">dodgerblue</div>
        <div class="swatch named">named</div>
      </div>
      <div>
        <div class="label">white</div>
        <div class="swatch white">white</div>
      </div>
    </div>
  </body>
</html>

<!doctype html>
<!-- probe: (150,150)=#0000ff (200,200)=#ff0000 (50,50)=#0000ff -->
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <title>Layout: z-index paint order</title>
    <style>
      body {
        margin: 0;
        padding: 0;
        background: #ffffff;
      }
      .anchor {
        position: relative;
        width: 300px;
        height: 300px;
        background: #f5f5f5;
      }
      .box {
        position: absolute;
        width: 120px;
        height: 120px;
      }
      /* Source order: blue first, then red. Without z-index, red would be on top. */
      /* With z-index, blue overrides red. */
      .blue {
        top: 40px;
        left: 40px;
        background: #0000ff;
        z-index: 2;
      }
      .red {
        top: 100px;
        left: 100px;
        background: #ff0000;
        z-index: 1;
      }
    </style>
  </head>
  <body>
    <div class="anchor">
      <div class="box blue"></div>
      <div class="box red"></div>
    </div>
  </body>
</html>

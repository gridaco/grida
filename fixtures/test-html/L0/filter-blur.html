<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <title>Paint: Filter Blur</title>
    <style>
      body {
        margin: 0;
        padding: 24px;
        background: #fff;
        color: #000;
        font-family: system-ui, sans-serif;
        font-size: 14px;
      }

      .label {
        font-size: 11px;
        color: #666;
        padding-bottom: 4px;
      }

      .grid {
        display: flex;
        flex-direction: row;
        flex-wrap: wrap;
        gap: 32px;
      }

      .box {
        width: 140px;
        height: 100px;
        background: #000;
        display: flex;
        align-items: center;
        justify-content: center;
        font-size: 12px;
        color: #fff;
      }

      .blur-2 {
        filter: blur(2px);
      }
      .blur-6 {
        filter: blur(6px);
      }
      .blur-12 {
        filter: blur(12px);
      }
      .drop-shadow {
        filter: drop-shadow(4px 4px 8px rgba(0, 0, 0, 0.6));
      }
    </style>
  </head>
  <body>
    <div class="grid">
      <div>
        <div class="label">no filter</div>
        <div class="box">sharp</div>
      </div>
      <div>
        <div class="label">blur(2px)</div>
        <div class="box blur-2">2px</div>
      </div>
      <div>
        <div class="label">blur(6px)</div>
        <div class="box blur-6">6px</div>
      </div>
      <div>
        <div class="label">blur(12px)</div>
        <div class="box blur-12">12px</div>
      </div>
      <div>
        <div class="label">drop-shadow()</div>
        <div class="box drop-shadow">drop-shadow</div>
      </div>
    </div>
  </body>
</html>

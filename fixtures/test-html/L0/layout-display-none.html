<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <title>Layout: display:none</title>
    <style>
      body {
        background: #030712;
        color: #e2e8f0;
        font-family: system-ui, sans-serif;
        font-size: 14px;
        padding: 24px;
      }

      .container {
        display: flex;
        flex-direction: column;
        gap: 8px;
      }

      .item {
        background: #6366f1;
        border-radius: 6px;
        padding: 12px 16px;
        color: #fff;
        font-size: 13px;
      }

      .hidden {
        display: none;
      }
    </style>
  </head>
  <body>
    <div class="container">
      <div class="item">1 — visible</div>
      <div class="item hidden">2 — hidden (display:none)</div>
      <div class="item">3 — visible</div>
      <div class="item hidden">4 — hidden (display:none)</div>
      <div class="item">5 — visible</div>
    </div>
  </body>
</html>

<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <title>Paint: Position Absolute (simple)</title>
    <style>
      html,
      body {
        min-height: 800px;
        box-sizing: border-box;
      }
      body {
        margin: 0;
        padding: 32px;
        background: #fff;
        color: #000;
        font-family: system-ui, sans-serif;
        font-size: 14px;
      }

      .container {
        position: relative;
        width: 400px;
        height: 300px;
        background: #eee;
        margin-bottom: 24px;
      }

      .dot {
        position: absolute;
        width: 40px;
        height: 40px;
        background: #000;
        box-sizing: border-box;
      }

      .tl {
        top: 0;
        left: 0;
      }
      .tr {
        top: 0;
        right: 0;
      }
      .bl {
        bottom: 0;
        left: 0;
      }
      .br {
        bottom: 0;
        right: 0;
      }
      .center {
        top: 50%;
        left: 50%;
        transform: translate(-50%, -50%);
        background: #c00;
      }
    </style>
  </head>
  <body>
    <div class="container">
      <div class="dot tl"></div>
      <div class="dot tr"></div>
      <div class="dot bl"></div>
      <div class="dot br"></div>
      <div class="dot center"></div>
    </div>
  </body>
</html>

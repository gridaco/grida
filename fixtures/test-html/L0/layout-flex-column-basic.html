<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <title>Layout: Flex Column Basic</title>
    <style>
      html,
      body {
        min-height: 800px;
        box-sizing: border-box;
      }
      body {
        margin: 0;
        padding: 32px;
        background: #fff;
        color: #000;
        font-family: system-ui, sans-serif;
        font-size: 14px;
      }

      .label {
        font-size: 11px;
        color: #666;
        padding-bottom: 4px;
        width: 100px;
        height: 16px;
      }

      .row {
        display: flex;
        flex-direction: row;
        gap: 24px;
      }

      .col {
        display: flex;
        flex-direction: column;
        width: 100px;
        height: 300px;
        background: #eee;
        box-sizing: border-box;
      }

      .item {
        width: 100px;
        height: 60px;
        background: #000;
        box-sizing: border-box;
      }

      .gap-12 {
        gap: 12px;
      }
      .justify-between {
        justify-content: space-between;
      }
      .justify-end {
        justify-content: flex-end;
      }

      .col-group {
        display: flex;
        flex-direction: column;
      }
    </style>
  </head>
  <body>
    <div class="row">
      <div class="col-group">
        <div class="label">default (start)</div>
        <div class="col">
          <div class="item"></div>
          <div class="item"></div>
          <div class="item"></div>
        </div>
      </div>
      <div class="col-group">
        <div class="label">gap 12</div>
        <div class="col gap-12">
          <div class="item"></div>
          <div class="item"></div>
          <div class="item"></div>
        </div>
      </div>
      <div class="col-group">
        <div class="label">space-between</div>
        <div class="col justify-between">
          <div class="item"></div>
          <div class="item"></div>
          <div class="item"></div>
        </div>
      </div>
    </div>
  </body>
</html>

<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <title>Paint: Filter (simple functions)</title>
    <style>
      html,
      body {
        min-height: 800px;
        box-sizing: border-box;
      }
      body {
        margin: 0;
        padding: 32px;
        background: #fff;
        color: #000;
        font-family: system-ui, sans-serif;
        font-size: 14px;
      }

      .grid {
        display: flex;
        flex-direction: row;
        flex-wrap: wrap;
        gap: 16px;
      }

      .swatch {
        width: 100px;
        height: 100px;
        background: #c00;
        box-sizing: border-box;
      }

      .none {
        filter: none;
      }
      .invert {
        filter: invert(1);
      }
      .grayscale {
        filter: grayscale(1);
      }
      .brightness {
        filter: brightness(0.5);
      }
      .opacity {
        filter: opacity(0.5);
      }
    </style>
  </head>
  <body>
    <div class="grid">
      <div class="swatch none"></div>
      <div class="swatch invert"></div>
      <div class="swatch grayscale"></div>
      <div class="swatch brightness"></div>
      <div class="swatch opacity"></div>
    </div>
  </body>
</html>

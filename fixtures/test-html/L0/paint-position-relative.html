<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <title>Paint: Position Relative</title>
    <style>
      html,
      body {
        min-height: 800px;
        box-sizing: border-box;
      }
      body {
        margin: 0;
        padding: 32px;
        background: #fff;
        color: #000;
        font-family: system-ui, sans-serif;
        font-size: 14px;
      }

      .row {
        display: flex;
        flex-direction: row;
        gap: 32px;
        margin-bottom: 32px;
      }

      .box {
        width: 80px;
        height: 60px;
        background: #000;
        box-sizing: border-box;
      }

      .marker {
        background: #eee;
      }

      .shift-tl {
        position: relative;
        top: -12px;
        left: -12px;
      }
      .shift-br {
        position: relative;
        top: 16px;
        left: 24px;
      }
    </style>
  </head>
  <body>
    <div class="row">
      <div class="box marker"></div>
      <div class="box shift-tl"></div>
      <div class="box marker"></div>
      <div class="box shift-br"></div>
      <div class="box marker"></div>
    </div>
  </body>
</html>

<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <title>Paint: object-position on &lt;img&gt;</title>
    <style>
      body {
        margin: 0;
        padding: 24px;
        background: #fff;
        color: #000;
        font-family: system-ui, sans-serif;
        font-size: 12px;
      }
      .label {
        font-size: 11px;
        color: #666;
        padding-bottom: 4px;
      }
      .grid {
        display: flex;
        flex-direction: row;
        flex-wrap: wrap;
        gap: 16px;
      }
      img {
        width: 160px;
        height: 120px;
        background: #f5f5f5;
        border: 1px solid #ccc;
        object-fit: contain;
      }
      .pos-default {
      }
      .pos-top-left {
        object-position: 0 0;
      }
      .pos-bottom-right {
        object-position: 100% 100%;
      }
      .pos-center-top {
        object-position: center top;
      }
      .pos-px {
        object-position: 20px 10px;
      }
      .pos-mixed {
        object-position: 80% 10px;
      }
      .fit-cover-left {
        object-fit: cover;
        object-position: left center;
      }
    </style>
  </head>
  <body>
    <div class="grid">
      <div>
        <div class="label">default (center)</div>
        <img class="pos-default" src="../../images/checker.png" alt="checker" />
      </div>
      <div>
        <div class="label">0 0 (top-left)</div>
        <img
          class="pos-top-left"
          src="../../images/checker.png"
          alt="checker"
        />
      </div>
      <div>
        <div class="label">100% 100% (bottom-right)</div>
        <img
          class="pos-bottom-right"
          src="../../images/checker.png"
          alt="checker"
        />
      </div>
      <div>
        <div class="label">center top</div>
        <img
          class="pos-center-top"
          src="../../images/checker.png"
          alt="checker"
        />
      </div>
      <div>
        <div class="label">20px 10px</div>
        <img class="pos-px" src="../../images/checker.png" alt="checker" />
      </div>
      <div>
        <div class="label">80% 10px (mixed)</div>
        <img class="pos-mixed" src="../../images/checker.png" alt="checker" />
      </div>
      <div>
        <div class="label">cover + left center</div>
        <img
          class="fit-cover-left"
          src="../../images/stripes.png"
          alt="stripes"
        />
      </div>
    </div>
  </body>
</html>

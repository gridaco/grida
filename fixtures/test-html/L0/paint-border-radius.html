<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <title>Paint: Border Radius</title>
    <style>
      body {
        background: #030712;
        color: #e2e8f0;
        font-family: system-ui, sans-serif;
        font-size: 14px;
        padding: 24px;
      }

      .label {
        font-size: 11px;
        color: #94a3b8;
        padding-bottom: 6px;
      }

      .grid {
        display: flex;
        flex-direction: row;
        flex-wrap: wrap;
        gap: 16px;
      }

      .box {
        width: 120px;
        height: 120px;
        background: #6366f1;
        display: flex;
        align-items: center;
        justify-content: center;
        font-size: 11px;
        color: #fff;
      }

      .uniform {
        border-radius: 12px;
      }
      .pill {
        border-radius: 9999px;
        width: 180px;
        height: 48px;
      }
      .circle {
        border-radius: 50%;
      }
      .tl-only {
        border-radius: 24px 0 0 0;
      }
      .mixed {
        border-radius: 4px 24px 4px 24px;
      }
      .elliptical {
        border-radius: 50% / 25%;
      }
    </style>
  </head>
  <body>
    <div class="grid">
      <div>
        <div class="label">12px uniform</div>
        <div class="box uniform">uniform</div>
      </div>
      <div>
        <div class="label">pill (9999px)</div>
        <div class="box pill">pill</div>
      </div>
      <div>
        <div class="label">circle (50%)</div>
        <div class="box circle">circle</div>
      </div>
      <div>
        <div class="label">top-left only (24px)</div>
        <div class="box tl-only">tl-only</div>
      </div>
      <div>
        <div class="label">mixed (4/24/4/24)</div>
        <div class="box mixed">mixed</div>
      </div>
      <div>
        <div class="label">elliptical (50%/25%)</div>
        <div class="box elliptical">elliptical</div>
      </div>
    </div>
  </body>
</html>

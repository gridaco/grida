<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <title>Layout: Block flow</title>
    <style>
      html,
      body {
        min-height: 800px;
        box-sizing: border-box;
      }
      body {
        margin: 0;
        padding: 32px;
        background: #fff;
        color: #000;
        font-family: system-ui, sans-serif;
        font-size: 14px;
      }

      .container {
        width: 400px;
        background: #eee;
        padding: 8px;
        box-sizing: border-box;
      }

      .block {
        height: 40px;
        background: #000;
        box-sizing: border-box;
      }
      .red {
        background: #c00;
      }

      .w-50 {
        width: 50%;
      }
      .w-75 {
        width: 75%;
      }
    </style>
  </head>
  <body>
    <div class="container">
      <div class="block"></div>
      <div class="block red w-75"></div>
      <div class="block w-50"></div>
      <div class="block red"></div>
    </div>
  </body>
</html>

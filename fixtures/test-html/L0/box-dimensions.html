<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <title>Box: Dimensions</title>
    <style>
      body {
        margin: 0;
        padding: 24px;
        background: #fff;
        color: #000;
        font-family: system-ui, sans-serif;
        font-size: 14px;
      }

      .label {
        font-size: 11px;
        color: #666;
        padding-bottom: 4px;
      }

      .rows {
        display: flex;
        flex-direction: column;
        gap: 16px;
      }

      .box {
        background: #000;
        border-radius: 6px;
        display: flex;
        align-items: center;
        justify-content: center;
        font-size: 12px;
        color: #fff;
      }

      .fixed {
        width: 200px;
        height: 60px;
      }
      .min-w {
        min-width: 300px;
        height: 48px;
      }
      .max-w {
        max-width: 180px;
        height: 48px;
      }
      .min-h {
        width: 160px;
        min-height: 80px;
      }
      .max-h {
        width: 160px;
        max-height: 40px;
        overflow: hidden;
      }
      .mixed {
        min-width: 120px;
        max-width: 400px;
        width: 260px;
        height: 56px;
      }
    </style>
  </head>
  <body>
    <div class="rows">
      <div>
        <div class="label">width: 200px; height: 60px</div>
        <div class="box fixed">200 × 60</div>
      </div>
      <div>
        <div class="label">min-width: 300px</div>
        <div class="box min-w">min-w 300</div>
      </div>
      <div>
        <div class="label">max-width: 180px</div>
        <div class="box max-w">max-w 180</div>
      </div>
      <div>
        <div class="label">min-height: 80px</div>
        <div class="box min-h">min-h 80</div>
      </div>
      <div>
        <div class="label">max-height: 40px + overflow:hidden</div>
        <div class="box max-h">max-h 40 (clipped)</div>
      </div>
      <div>
        <div class="label">
          min-width: 120px; max-width: 400px; width: 260px
        </div>
        <div class="box mixed">mixed constraints</div>
      </div>
    </div>
  </body>
</html>

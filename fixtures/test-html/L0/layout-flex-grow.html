<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <title>Layout: Flex Grow</title>
    <style>
      html,
      body {
        min-height: 800px;
        box-sizing: border-box;
      }
      body {
        margin: 0;
        padding: 32px;
        background: #fff;
        color: #000;
        font-family: system-ui, sans-serif;
        font-size: 14px;
      }

      .label {
        font-size: 11px;
        color: #666;
        padding-bottom: 4px;
        width: 300px;
        height: 16px;
      }

      .row {
        display: flex;
        flex-direction: row;
        width: 300px;
        height: 60px;
        background: #eee;
        margin-bottom: 24px;
        box-sizing: border-box;
      }

      .item {
        height: 60px;
        background: #000;
        box-sizing: border-box;
      }

      .i-80 {
        width: 80px;
      }
      .g-1 {
        flex-grow: 1;
        flex-basis: 0;
      }
      .g-2 {
        flex-grow: 2;
        flex-basis: 0;
      }
    </style>
  </head>
  <body>
    <div class="label">grow 1 / grow 1 / grow 1 (equal thirds)</div>
    <div class="row">
      <div class="item g-1"></div>
      <div class="item g-1" style="background: #c00"></div>
      <div class="item g-1"></div>
    </div>
    <div class="label">80px fixed / grow 1 / 80px fixed</div>
    <div class="row">
      <div class="item i-80"></div>
      <div class="item g-1" style="background: #c00"></div>
      <div class="item i-80"></div>
    </div>
    <div class="label">grow 1 / grow 2 (one third / two thirds)</div>
    <div class="row">
      <div class="item g-1"></div>
      <div class="item g-2" style="background: #c00"></div>
    </div>
  </body>
</html>

<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <title>Paint: Margin (simple)</title>
    <style>
      html,
      body {
        min-height: 800px;
        box-sizing: border-box;
      }
      body {
        margin: 0;
        padding: 32px;
        background: #fff;
        color: #000;
        font-family: system-ui, sans-serif;
        font-size: 14px;
      }

      .frame {
        width: 300px;
        background: #eee;
        box-sizing: border-box;
      }

      .box {
        width: 120px;
        height: 40px;
        background: #000;
        box-sizing: border-box;
      }

      .m-0 {
        margin: 0;
      }
      .m-tb-8 {
        margin: 8px 0;
      }
      .m-tb-20 {
        margin: 20px 0;
      }
      .m-l-40 {
        margin-left: 40px;
      }
    </style>
  </head>
  <body>
    <div class="frame">
      <div class="box m-0"></div>
      <div class="box m-tb-8"></div>
      <div class="box m-tb-20"></div>
      <div class="box m-l-40"></div>
    </div>
  </body>
</html>

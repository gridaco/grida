<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <title>Paint: Opacity Nested</title>
    <style>
      html,
      body {
        min-height: 800px;
        box-sizing: border-box;
      }
      body {
        margin: 0;
        padding: 32px;
        background: #fff;
        color: #000;
        font-family: system-ui, sans-serif;
        font-size: 14px;
      }

      .row {
        display: flex;
        flex-direction: row;
        gap: 24px;
        margin-bottom: 24px;
      }

      .outer {
        width: 160px;
        height: 120px;
        background: #000;
        box-sizing: border-box;
        padding: 20px;
      }

      .inner {
        width: 100%;
        height: 100%;
        background: #000;
      }

      .outer-50 {
        opacity: 0.5;
      }
      .outer-50 .inner {
        opacity: 0.5;
      }

      .outer-25 {
        opacity: 0.25;
      }
      .outer-25 .inner {
        opacity: 1;
      }

      .outer-100 {
        opacity: 1;
      }
      .outer-100 .inner {
        opacity: 0.5;
      }
    </style>
  </head>
  <body>
    <div class="row">
      <div class="outer outer-50"><div class="inner"></div></div>
      <div class="outer outer-25"><div class="inner"></div></div>
      <div class="outer outer-100"><div class="inner"></div></div>
    </div>
  </body>
</html>

<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <title>Layout: Flex Align Self</title>
    <style>
      html,
      body {
        min-height: 800px;
        box-sizing: border-box;
      }
      body {
        margin: 0;
        padding: 32px;
        background: #fff;
        color: #000;
        font-family: system-ui, sans-serif;
        font-size: 14px;
      }

      .row {
        display: flex;
        align-items: center;
        width: 500px;
        height: 120px;
        gap: 16px;
        margin-bottom: 24px;
        background: #eee;
      }

      .item {
        width: 60px;
        height: 40px;
        background: #000;
      }

      .self-start {
        align-self: flex-start;
      }
      .self-end {
        align-self: flex-end;
      }
      .self-center {
        align-self: center;
      }
      .self-stretch {
        align-self: stretch;
        height: auto;
      }
    </style>
  </head>
  <body>
    <div class="row">
      <div class="item self-start"></div>
      <div class="item self-end"></div>
      <div class="item self-center"></div>
      <div class="item self-stretch"></div>
      <div class="item"></div>
    </div>
  </body>
</html>

<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <title>Paint: background-repeat</title>
    <style>
      body {
        margin: 0;
        padding: 24px;
        background: #fff;
        color: #000;
        font-family: system-ui, sans-serif;
        font-size: 14px;
      }
      .label {
        font-size: 11px;
        color: #666;
        padding-bottom: 4px;
      }
      .grid {
        display: flex;
        flex-direction: row;
        flex-wrap: wrap;
        gap: 16px;
      }
      .rect {
        width: 160px;
        height: 120px;
        border: 1px solid #ccc;
        background-size: 40px 40px;
        background-image: linear-gradient(
          135deg,
          #ff0000 0 50%,
          #0000ff 50% 100%
        );
      }
      .rep-repeat {
        background-repeat: repeat;
      }
      .rep-no {
        background-repeat: no-repeat;
      }
      .rep-x {
        background-repeat: repeat-x;
      }
      .rep-y {
        background-repeat: repeat-y;
      }
      .rep-space {
        background-repeat: space;
      }
      .rep-round {
        background-repeat: round;
      }
      .rep-mixed {
        background-repeat: repeat no-repeat;
      }
    </style>
  </head>
  <body>
    <div class="grid">
      <div>
        <div class="label">repeat</div>
        <div class="rect rep-repeat"></div>
      </div>
      <div>
        <div class="label">no-repeat</div>
        <div class="rect rep-no"></div>
      </div>
      <div>
        <div class="label">repeat-x</div>
        <div class="rect rep-x"></div>
      </div>
      <div>
        <div class="label">repeat-y</div>
        <div class="rect rep-y"></div>
      </div>
      <div>
        <div class="label">space</div>
        <div class="rect rep-space"></div>
      </div>
      <div>
        <div class="label">round</div>
        <div class="rect rep-round"></div>
      </div>
      <div>
        <div class="label">repeat no-repeat (= repeat-x)</div>
        <div class="rect rep-mixed"></div>
      </div>
    </div>
  </body>
</html>

<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <title>Paint: Individual Transform Properties</title>
    <style>
      html,
      body {
        min-height: 800px;
        box-sizing: border-box;
      }
      body {
        margin: 0;
        padding: 64px;
        background: #fff;
        color: #000;
        font-family: system-ui, sans-serif;
        font-size: 14px;
      }

      .grid {
        display: flex;
        flex-direction: row;
        flex-wrap: wrap;
        gap: 48px;
      }

      .frame {
        width: 120px;
        height: 120px;
        background: #eee;
        box-sizing: border-box;
      }

      .box {
        width: 120px;
        height: 120px;
        background: #000;
        box-sizing: border-box;
      }

      .t-prop {
        translate: 16px 24px;
      }
      .s-prop {
        scale: 0.5;
      }
      .all {
        translate: 20px 10px;
        scale: 0.5;
      }
    </style>
  </head>
  <body>
    <div class="grid">
      <div class="frame"><div class="box t-prop"></div></div>
      <div class="frame"><div class="box s-prop"></div></div>
      <div class="frame"><div class="box all"></div></div>
    </div>
  </body>
</html>

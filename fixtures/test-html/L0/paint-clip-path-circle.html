<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <title>Paint: Clip-Path Circle</title>
    <style>
      html,
      body {
        min-height: 800px;
        box-sizing: border-box;
      }
      body {
        margin: 0;
        padding: 32px;
        background: #fff;
        color: #000;
        font-family: system-ui, sans-serif;
        font-size: 14px;
      }

      .grid {
        display: flex;
        flex-direction: row;
        flex-wrap: wrap;
        gap: 24px;
      }

      .box {
        width: 140px;
        height: 140px;
        background: #000;
        box-sizing: border-box;
      }

      .default {
        clip-path: circle();
      }
      .px30 {
        clip-path: circle(30px);
      }
      .px20 {
        clip-path: circle(20px);
      }
    </style>
  </head>
  <body>
    <div class="grid">
      <div class="box default"></div>
      <div class="box px30"></div>
      <div class="box px20"></div>
    </div>
  </body>
</html>

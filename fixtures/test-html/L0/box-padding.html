<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <title>Box: Padding</title>
    <style>
      body {
        background: #030712;
        color: #e2e8f0;
        font-family: system-ui, sans-serif;
        font-size: 14px;
        padding: 24px;
      }

      .label {
        font-size: 11px;
        color: #94a3b8;
        padding-bottom: 6px;
      }

      .columns {
        display: flex;
        flex-direction: row;
        flex-wrap: wrap;
        gap: 16px;
      }

      .outer {
        background: #1e293b;
        border-radius: 8px;
      }

      .inner {
        background: #6366f1;
        border-radius: 4px;
        font-size: 12px;
        color: #fff;
      }

      .uniform {
        padding: 24px;
      }
      .horizontal {
        padding: 8px 32px;
      }
      .vertical {
        padding: 32px 8px;
      }
      .asymmetric {
        padding: 8px 16px 32px 48px;
      }
    </style>
  </head>
  <body>
    <div class="columns">
      <div>
        <div class="label">padding: 24px (uniform)</div>
        <div class="outer uniform">
          <div class="inner">content</div>
        </div>
      </div>
      <div>
        <div class="label">padding: 8px 32px (horizontal)</div>
        <div class="outer horizontal">
          <div class="inner">content</div>
        </div>
      </div>
      <div>
        <div class="label">padding: 32px 8px (vertical)</div>
        <div class="outer vertical">
          <div class="inner">content</div>
        </div>
      </div>
      <div>
        <div class="label">padding: 8px 16px 32px 48px</div>
        <div class="outer asymmetric">
          <div class="inner">content</div>
        </div>
      </div>
    </div>
  </body>
</html>

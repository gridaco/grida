<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <title>Layout: Flex align-items</title>
    <style>
      html,
      body {
        min-height: 800px;
        box-sizing: border-box;
      }
      body {
        margin: 0;
        padding: 32px;
        background: #fff;
        color: #000;
        font-family: system-ui, sans-serif;
        font-size: 14px;
      }

      .label {
        font-size: 11px;
        color: #666;
        padding-bottom: 4px;
        width: 180px;
        height: 16px;
      }

      .row {
        display: flex;
        flex-direction: row;
        width: 500px;
        height: 120px;
        background: #eee;
        margin-bottom: 24px;
        gap: 12px;
        padding: 8px;
        box-sizing: border-box;
      }

      .i-short {
        width: 60px;
        height: 40px;
        background: #000;
      }
      .i-med {
        width: 60px;
        height: 60px;
        background: #000;
      }
      .i-tall {
        width: 60px;
        height: 80px;
        background: #000;
      }

      .a-start {
        align-items: flex-start;
      }
      .a-end {
        align-items: flex-end;
      }
      .a-center {
        align-items: center;
      }
    </style>
  </head>
  <body>
    <div class="label">flex-start</div>
    <div class="row a-start">
      <div class="i-short"></div>
      <div class="i-med"></div>
      <div class="i-tall"></div>
    </div>
    <div class="label">flex-end</div>
    <div class="row a-end">
      <div class="i-short"></div>
      <div class="i-med"></div>
      <div class="i-tall"></div>
    </div>
    <div class="label">center</div>
    <div class="row a-center">
      <div class="i-short"></div>
      <div class="i-med"></div>
      <div class="i-tall"></div>
    </div>
  </body>
</html>

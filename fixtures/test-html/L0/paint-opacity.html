<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <title>Paint: Opacity</title>
    <style>
      body {
        background: #030712;
        color: #e2e8f0;
        font-family: system-ui, sans-serif;
        font-size: 14px;
        padding: 24px;
      }

      .label {
        font-size: 11px;
        color: #94a3b8;
        padding-bottom: 6px;
      }

      .grid {
        display: flex;
        flex-direction: row;
        flex-wrap: wrap;
        gap: 16px;
      }

      .box {
        width: 120px;
        height: 80px;
        background: #6366f1;
        border-radius: 8px;
        display: flex;
        align-items: center;
        justify-content: center;
        font-size: 12px;
        color: #fff;
      }

      .o100 {
        opacity: 1;
      }
      .o75 {
        opacity: 0.75;
      }
      .o50 {
        opacity: 0.5;
      }
      .o25 {
        opacity: 0.25;
      }

      .section {
        padding-bottom: 24px;
      }

      .text-row {
        display: flex;
        flex-direction: column;
        gap: 4px;
      }

      .text-item {
        font-size: 16px;
        font-weight: 700;
        color: #6366f1;
      }
    </style>
  </head>
  <body>
    <div class="section">
      <div class="label">Boxes at different opacities</div>
      <div class="grid">
        <div>
          <div class="label">1.0</div>
          <div class="box o100">100%</div>
        </div>
        <div>
          <div class="label">0.75</div>
          <div class="box o75">75%</div>
        </div>
        <div>
          <div class="label">0.5</div>
          <div class="box o50">50%</div>
        </div>
        <div>
          <div class="label">0.25</div>
          <div class="box o25">25%</div>
        </div>
      </div>
    </div>

    <div class="section">
      <div class="label">Text at different opacities</div>
      <div class="text-row">
        <div class="text-item o100">opacity: 1.0</div>
        <div class="text-item o75">opacity: 0.75</div>
        <div class="text-item o50">opacity: 0.5</div>
        <div class="text-item o25">opacity: 0.25</div>
      </div>
    </div>
  </body>
</html>

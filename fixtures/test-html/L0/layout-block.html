<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <title>Layout: Block Flow</title>
    <style>
      body {
        margin: 0;
        padding: 24px;
        background: #fff;
        color: #000;
        font-family: system-ui, sans-serif;
        font-size: 14px;
      }

      .block {
        background: #eee;
        padding: 16px;
        border-radius: 8px;
      }

      .block + .block {
        /* spacing via parent padding, not margin */
      }

      .spacer {
        padding-top: 12px;
      }

      .inner {
        background: #ccc;
        padding: 12px;
        border-radius: 4px;
      }

      .clipped {
        background: #eee;
        padding: 16px;
        border-radius: 8px;
        overflow: hidden;
        height: 60px;
      }
    </style>
  </head>
  <body>
    <div class="block">
      <div class="inner">Block 1 with padding</div>
    </div>

    <div class="spacer"></div>

    <div class="block">
      <div class="inner">Block 2 — nested padding</div>
      <div class="spacer"></div>
      <div class="inner">Second child in block 2</div>
    </div>

    <div class="spacer"></div>

    <div class="clipped">
      <div class="inner">
        This container has overflow: hidden and a fixed height. The content
        below should be clipped and not visible in the rendered output.
      </div>
      <div class="spacer"></div>
      <div class="inner">This text should be clipped.</div>
    </div>
  </body>
</html>

<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <title>Paint: Transform (combined functions)</title>
    <style>
      html,
      body {
        min-height: 800px;
        box-sizing: border-box;
      }
      body {
        margin: 0;
        padding: 64px;
        background: #fff;
        color: #000;
        font-family: system-ui, sans-serif;
        font-size: 14px;
      }

      .grid {
        display: flex;
        flex-direction: row;
        flex-wrap: wrap;
        gap: 72px;
      }

      .frame {
        width: 120px;
        height: 120px;
        background: #eee;
        box-sizing: border-box;
      }

      .box {
        width: 120px;
        height: 120px;
        background: #000;
        box-sizing: border-box;
      }

      .t-then-s {
        transform: translate(16px, 24px) scale(0.5);
      }
      .s-then-t {
        transform: scale(0.5) translate(16px, 24px);
      }
    </style>
  </head>
  <body>
    <div class="grid">
      <div class="frame"><div class="box t-then-s"></div></div>
      <div class="frame"><div class="box s-then-t"></div></div>
    </div>
  </body>
</html>

<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <title>Paint: Box Shadow (Solid / No Blur)</title>
    <style>
      html,
      body {
        min-height: 800px;
        box-sizing: border-box;
      }
      body {
        margin: 0;
        padding: 32px;
        background: #fff;
        color: #000;
        font-family: system-ui, sans-serif;
        font-size: 14px;
      }

      .label {
        font-size: 11px;
        color: #666;
        padding-bottom: 4px;
        width: 140px;
        height: 16px;
      }

      .grid {
        display: flex;
        flex-direction: row;
        flex-wrap: wrap;
        gap: 40px;
      }

      .box {
        width: 120px;
        height: 80px;
        background: #ddd;
        box-sizing: border-box;
      }

      .offset {
        box-shadow: 6px 6px 0 0 #000;
      }
      .offset-neg {
        box-shadow: -6px -6px 0 0 #000;
      }
      .spread {
        box-shadow: 0 0 0 4px #000;
      }
      .spread-offset {
        box-shadow: 4px 4px 0 2px #000;
      }
      .colored {
        box-shadow: 6px 6px 0 0 #c00;
      }
    </style>
  </head>
  <body>
    <div class="grid">
      <div>
        <div class="label">offset 6/6</div>
        <div class="box offset"></div>
      </div>
      <div>
        <div class="label">offset -6/-6</div>
        <div class="box offset-neg"></div>
      </div>
      <div>
        <div class="label">spread 4</div>
        <div class="box spread"></div>
      </div>
      <div>
        <div class="label">spread 2 + offset 4</div>
        <div class="box spread-offset"></div>
      </div>
      <div>
        <div class="label">colored #c00</div>
        <div class="box colored"></div>
      </div>
    </div>
  </body>
</html>

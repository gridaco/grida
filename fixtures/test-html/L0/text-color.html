<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <title>Text: Color</title>
    <style>
      body {
        margin: 0;
        padding: 24px;
        background: #fff;
        color: #000;
        font-family: system-ui, sans-serif;
        font-size: 14px;
      }

      .lines {
        display: flex;
        flex-direction: column;
        gap: 8px;
        font-size: 16px;
      }

      .hex {
        color: #00f;
      }
      .rgb {
        color: rgb(0, 128, 0);
      }
      .rgba {
        color: rgba(255, 0, 0, 0.7);
      }
      .named {
        color: blue;
      }
      .inherit-parent {
        color: #f00;
      }
    </style>
  </head>
  <body>
    <div class="lines">
      <div class="hex">color: #00f (hex)</div>
      <div class="rgb">color: rgb(0, 128, 0)</div>
      <div class="rgba">color: rgba(255, 0, 0, 0.7)</div>
      <div class="named">color: blue (named)</div>
      <div class="inherit-parent">
        parent is #f00
        <span>child inherits color</span>
      </div>
    </div>
  </body>
</html>

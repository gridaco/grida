<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <title>Paint: Overflow Hidden</title>
    <style>
      html,
      body {
        min-height: 800px;
        box-sizing: border-box;
      }
      body {
        margin: 0;
        padding: 32px;
        background: #fff;
        color: #000;
        font-family: system-ui, sans-serif;
        font-size: 14px;
      }

      .grid {
        display: flex;
        flex-direction: row;
        flex-wrap: wrap;
        gap: 32px;
      }

      .container {
        width: 160px;
        height: 120px;
        background: #eee;
        box-sizing: border-box;
        position: relative;
      }

      .clipped {
        overflow: hidden;
      }

      .visible {
        overflow: visible;
      }

      .child {
        position: absolute;
        top: 40px;
        left: 40px;
        width: 200px;
        height: 160px;
        background: #000;
        box-sizing: border-box;
      }
    </style>
  </head>
  <body>
    <div class="grid">
      <div class="container clipped">
        <div class="child"></div>
      </div>
      <div class="container visible">
        <div class="child"></div>
      </div>
    </div>
  </body>
</html>

<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <title>Paint: Mix Blend Mode</title>
    <style>
      html,
      body {
        min-height: 800px;
        box-sizing: border-box;
      }
      body {
        margin: 0;
        padding: 32px;
        background: #fff;
        color: #000;
        font-family: system-ui, sans-serif;
        font-size: 14px;
      }

      .row {
        display: flex;
        flex-direction: row;
        gap: 24px;
      }

      .pair {
        position: relative;
        width: 120px;
        height: 120px;
      }

      .base {
        width: 120px;
        height: 120px;
        background: #f00;
      }

      .over {
        position: absolute;
        top: 30px;
        left: 30px;
        width: 60px;
        height: 60px;
        background: #00f;
      }

      .multiply {
        mix-blend-mode: multiply;
      }
      .screen {
        mix-blend-mode: screen;
      }
      .difference {
        mix-blend-mode: difference;
      }
    </style>
  </head>
  <body>
    <div class="row">
      <div class="pair">
        <div class="base"></div>
        <div class="over multiply"></div>
      </div>
      <div class="pair">
        <div class="base"></div>
        <div class="over screen"></div>
      </div>
      <div class="pair">
        <div class="base"></div>
        <div class="over difference"></div>
      </div>
    </div>
  </body>
</html>

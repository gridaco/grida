<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <title>Paint: Linear Gradient</title>
    <style>
      body {
        margin: 0;
        padding: 24px;
        background: #fff;
        color: #000;
        font-family: system-ui, sans-serif;
        font-size: 14px;
      }

      .label {
        font-size: 11px;
        color: #666;
        padding-bottom: 4px;
      }

      .grid {
        display: flex;
        flex-direction: row;
        flex-wrap: wrap;
        gap: 16px;
      }

      .rect {
        width: 180px;
        height: 120px;
        display: flex;
        align-items: center;
        justify-content: center;
        font-size: 12px;
        color: #fff;
      }

      .to-right {
        background-image: linear-gradient(to right, #f00, #00f);
      }
      .to-bottom {
        background-image: linear-gradient(to bottom, #0f0, #00f);
      }
      .angle135 {
        background-image: linear-gradient(135deg, #f00, #0f0);
      }
      .to-bl {
        background-image: linear-gradient(to bottom left, #00f, #f00);
      }
      .multi-stop {
        background-image: linear-gradient(
          to right,
          #f00,
          #0f0 30%,
          #00f 60%,
          #000
        );
      }
      .to-top {
        background-image: linear-gradient(to top, #000, #f00);
      }
    </style>
  </head>
  <body>
    <div class="grid">
      <div>
        <div class="label">to right</div>
        <div class="rect to-right">to right</div>
      </div>
      <div>
        <div class="label">to bottom</div>
        <div class="rect to-bottom">to bottom</div>
      </div>
      <div>
        <div class="label">135deg</div>
        <div class="rect angle135">135deg</div>
      </div>
      <div>
        <div class="label">to bottom left</div>
        <div class="rect to-bl">to bottom left</div>
      </div>
      <div>
        <div class="label">multi-stop (4 colors)</div>
        <div class="rect multi-stop">multi-stop</div>
      </div>
      <div>
        <div class="label">to top</div>
        <div class="rect to-top">to top</div>
      </div>
    </div>
  </body>
</html>

<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <title>Paint: max-/min-width/height</title>
    <style>
      html,
      body {
        min-height: 800px;
        box-sizing: border-box;
      }
      body {
        margin: 0;
        padding: 32px;
        background: #fff;
        color: #000;
        font-family: system-ui, sans-serif;
        font-size: 14px;
      }

      .grid {
        display: flex;
        flex-direction: row;
        flex-wrap: wrap;
        gap: 24px;
      }

      .wrap {
        width: 200px;
        background: #eee;
        box-sizing: border-box;
        padding: 8px;
      }

      .box {
        background: #000;
        height: 40px;
        box-sizing: border-box;
      }

      .max-w {
        width: 300px;
        max-width: 120px;
      }
      .min-w {
        width: 40px;
        min-width: 160px;
      }
      .max-h {
        height: 100px;
        max-height: 40px;
        width: 100%;
      }
      .min-h {
        height: 20px;
        min-height: 60px;
        width: 100%;
      }
    </style>
  </head>
  <body>
    <div class="grid">
      <div class="wrap">
        <div class="box max-w"></div>
      </div>
      <div class="wrap">
        <div class="box min-w"></div>
      </div>
      <div class="wrap">
        <div class="box max-h"></div>
      </div>
      <div class="wrap">
        <div class="box min-h"></div>
      </div>
    </div>
  </body>
</html>

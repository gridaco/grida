<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <title>Paint: Radial Gradient</title>
    <style>
      body {
        margin: 0;
        padding: 24px;
        background: #fff;
        color: #000;
        font-family: system-ui, sans-serif;
        font-size: 14px;
      }

      .label {
        font-size: 11px;
        color: #666;
        padding-bottom: 4px;
      }

      .grid {
        display: flex;
        flex-direction: row;
        flex-wrap: wrap;
        gap: 16px;
      }

      .rect {
        width: 180px;
        height: 180px;
        display: flex;
        align-items: center;
        justify-content: center;
        font-size: 12px;
        color: #fff;
      }

      .simple {
        background: radial-gradient(circle, #f00, #000);
      }
      .multi-stop {
        background: radial-gradient(circle, #f00, #0f0 40%, #00f 80%, #000);
      }
      .stacked {
        background-color: #000;
        background-image: radial-gradient(
          circle,
          rgba(255, 0, 0, 0.8),
          transparent 70%
        );
      }
    </style>
  </head>
  <body>
    <div class="grid">
      <div>
        <div class="label">simple (2 stops)</div>
        <div class="rect simple">simple</div>
      </div>
      <div>
        <div class="label">multi-stop (4 colors)</div>
        <div class="rect multi-stop">multi-stop</div>
      </div>
      <div>
        <div class="label">stacked on solid bg</div>
        <div class="rect stacked">stacked</div>
      </div>
    </div>
  </body>
</html>

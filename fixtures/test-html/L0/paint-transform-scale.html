<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <title>Paint: Transform Scale</title>
    <style>
      html,
      body {
        min-height: 800px;
        box-sizing: border-box;
      }
      body {
        margin: 0;
        padding: 32px;
        background: #fff;
        color: #000;
        font-family: system-ui, sans-serif;
        font-size: 14px;
      }

      .label {
        font-size: 11px;
        color: #666;
        padding-bottom: 4px;
        width: 140px;
        height: 16px;
      }

      .grid {
        display: flex;
        flex-direction: row;
        flex-wrap: wrap;
        gap: 48px;
      }

      .frame {
        width: 140px;
        height: 100px;
        background: #eee;
        box-sizing: border-box;
      }

      .box {
        width: 140px;
        height: 100px;
        background: #000;
        box-sizing: border-box;
      }

      .s-half {
        transform: scale(0.5);
      }
      .s-xy {
        transform: scale(0.75, 0.5);
      }
      .s-x {
        transform: scaleX(0.5);
      }
      .s-y {
        transform: scaleY(0.75);
      }
    </style>
  </head>
  <body>
    <div class="grid">
      <div>
        <div class="label">scale 0.5</div>
        <div class="frame"><div class="box s-half"></div></div>
      </div>
      <div>
        <div class="label">scale 0.75, 0.5</div>
        <div class="frame"><div class="box s-xy"></div></div>
      </div>
      <div>
        <div class="label">scaleX 0.5</div>
        <div class="frame"><div class="box s-x"></div></div>
      </div>
      <div>
        <div class="label">scaleY 0.75</div>
        <div class="frame"><div class="box s-y"></div></div>
      </div>
    </div>
  </body>
</html>

<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <title>Paint: text-shadow</title>
    <style>
      body {
        margin: 0;
        padding: 24px;
        background: #fff;
        color: #000;
        font-family: system-ui, sans-serif;
        font-size: 32px;
      }
      .label {
        font-size: 11px;
        color: #666;
        padding-bottom: 4px;
      }
      .grid {
        display: flex;
        flex-direction: row;
        flex-wrap: wrap;
        gap: 24px;
      }
      .cell {
        display: flex;
        flex-direction: column;
      }
      .sharp {
        text-shadow: 4px 4px 0 #ff0000;
      }
      .soft {
        text-shadow: 2px 2px 6px #0000ff;
      }
      .glow {
        color: #000;
        text-shadow: 0 0 8px #00aa00;
      }
      .offset-only {
        text-shadow: 6px 0 0 #888;
      }
      .negative {
        text-shadow: -3px -3px 0 #ff00ff;
      }
      .stacked {
        text-shadow:
          2px 2px 0 #ff0000,
          -2px -2px 0 #0000ff;
      }
      .no-blur-no-color {
        text-shadow: 3px 3px;
      }
    </style>
  </head>
  <body>
    <div class="grid">
      <div class="cell">
        <div class="label">sharp: 4 4 0 red</div>
        <div class="sharp">Shadow</div>
      </div>
      <div class="cell">
        <div class="label">soft: 2 2 6 blue</div>
        <div class="soft">Shadow</div>
      </div>
      <div class="cell">
        <div class="label">glow: 0 0 8 green</div>
        <div class="glow">Shadow</div>
      </div>
      <div class="cell">
        <div class="label">offset only (no y, no blur)</div>
        <div class="offset-only">Shadow</div>
      </div>
      <div class="cell">
        <div class="label">negative offset</div>
        <div class="negative">Shadow</div>
      </div>
      <div class="cell">
        <div class="label">stacked (two layers)</div>
        <div class="stacked">Shadow</div>
      </div>
      <div class="cell">
        <div class="label">no blur, no color</div>
        <div class="no-blur-no-color">Shadow</div>
      </div>
    </div>
  </body>
</html>

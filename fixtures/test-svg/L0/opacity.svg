<svg xmlns="http://www.w3.org/2000/svg" width="800" height="600" viewBox="0 0 800 600">
    <title>Opacity</title>
    <desc>L0 test fixture for opacity</desc>
    <!-- Background -->
    <rect width="800" height="600" fill="#ffffff"/>

    <style>
        .label { font-family: monospace; font-size: 12px; fill: #666; }
        .bg-pattern { fill: url(#checker); }
    </style>

    <defs>
        <pattern id="checker" width="20" height="20" patternUnits="userSpaceOnUse">
            <rect width="10" height="10" fill="#ccc"/>
            <rect x="10" y="10" width="10" height="10" fill="#ccc"/>
        </pattern>
    </defs>

    <!-- 1. Element Opacity -->
    <g transform="translate(50, 50)">
        <text x="0" y="-10" class="label">Element opacity="0.5"</text>
        <rect width="150" height="100" class="bg-pattern"/>
        <circle cx="75" cy="50" r="40" fill="red" opacity="0.5"/>
    </g>

    <!-- 2. Fill and Stroke Opacity -->
    <g transform="translate(250, 50)">
        <text x="0" y="-10" class="label">fill-opacity &amp; stroke-opacity</text>
        <rect width="150" height="100" class="bg-pattern"/>
        <!-- Notice how the stroke and fill overlap and blend together, unlike element opacity -->
        <circle cx="75" cy="50" r="40" fill="blue" fill-opacity="0.5" stroke="red" stroke-width="10"
            stroke-opacity="0.5"/>
    </g>

    <!-- 3. Group Opacity vs Individual Opacity -->
    <g transform="translate(50, 250)">
        <text x="0" y="-10" class="label">Individual Opacity (Overlaps blend)</text>
        <rect width="150" height="150" class="bg-pattern"/>
        <circle cx="60" cy="60" r="40" fill="red" opacity="0.5"/>
        <circle cx="90" cy="90" r="40" fill="blue" opacity="0.5"/>
    </g>

    <g transform="translate(250, 250)">
        <text x="0" y="-10" class="label">Group Opacity (Rendered offscreen)</text>
        <rect width="150" height="150" class="bg-pattern"/>
        <!-- The group is rendered fully opaque to an offscreen buffer, then blended at 0.5 -->
        <!-- The red and blue circles do NOT blend with each other -->
        <g opacity="0.5">
            <circle cx="60" cy="60" r="40" fill="red"/>
            <circle cx="90" cy="90" r="40" fill="blue"/>
        </g>
    </g>

    <!-- 4. Nested Group Opacity -->
    <g transform="translate(450, 250)">
        <text x="0" y="-10" class="label">Nested Group Opacity (0.5 * 0.5 = 0.25)</text>
        <rect width="150" height="150" class="bg-pattern"/>
        <g opacity="0.5">
            <rect width="150" height="150" fill="green"/>
            <g opacity="0.5">
                <circle cx="75" cy="75" r="50" fill="yellow"/>
            </g>
        </g>
    </g>

</svg>
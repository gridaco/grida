<svg xmlns="http://www.w3.org/2000/svg" width="800" height="400" viewBox="0 0 800 400">
    <title>Basic Shapes</title>
    <desc>L0 test fixture for basic-shapes</desc>
    <!-- Background -->
    <rect width="800" height="400" fill="#ffffff"/>

    <style>
        .label { font-family: monospace; font-size: 12px; fill: #666; text-anchor: middle; }
        .shape { fill: #3498db; stroke: #1abc9c; stroke-width: 4; }
    </style>

    <!-- 1. Rectangles -->
    <g transform="translate(50, 50)">
        <rect x="0" y="0" width="80" height="80" class="shape"/>
        <text x="40" y="110" class="label">&lt;rect&gt;</text>
    </g>

    <g transform="translate(180, 50)">
        <rect x="0" y="0" width="80" height="80" rx="20" ry="20" class="shape"/>
        <text x="40" y="110" class="label">&lt;rect rx ry&gt;</text>
    </g>

    <!-- 2. Circles and Ellipses -->
    <g transform="translate(310, 50)">
        <circle cx="40" cy="40" r="40" class="shape"/>
        <text x="40" y="110" class="label">&lt;circle&gt;</text>
    </g>

    <g transform="translate(440, 50)">
        <ellipse cx="60" cy="40" rx="60" ry="30" class="shape"/>
        <text x="60" y="110" class="label">&lt;ellipse&gt;</text>
    </g>

    <!-- 3. Lines -->
    <g transform="translate(600, 50)">
        <line x1="0" y1="0" x2="80" y2="80" class="shape"/>
        <line x1="80" y1="0" x2="0" y2="80" class="shape"/>
        <text x="40" y="110" class="label">&lt;line&gt;</text>
    </g>

    <!-- 4. Polylines and Polygons -->
    <g transform="translate(180, 220)">
        <polyline points="0,80 40,0 80,80 120,0" fill="none" stroke="#e74c3c" stroke-width="4"/>
        <text x="60" y="110" class="label">&lt;polyline&gt;</text>
    </g>

    <g transform="translate(350, 220)">
        <polygon points="40,0 80,30 65,80 15,80 0,30" class="shape"/>
        <text x="40" y="110" class="label">&lt;polygon&gt;</text>
    </g>

    <!-- 5. Polygon Fill Rules -->
    <g transform="translate(520, 220)">
        <!-- A self-intersecting star -->
        <polygon points="50,0 65,40 100,40 70,60 80,100 50,75 20,100 30,60 0,40 35,40"
            fill="#9b59b6" fill-rule="evenodd" stroke="#8e44ad" stroke-width="2"/>
        <text x="50" y="110" class="label">polygon (evenodd)</text>
    </g>
</svg>
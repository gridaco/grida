name: test packages

on:
  push:
    branches:
      - main
  pull_request:
  workflow_dispatch:

jobs:
  # Wait for canvas build to finish first so artifacts are available.
  # On PRs, build-canvas runs in parallel — we need its artifact.
  wait-for-wasm:
    runs-on: ubuntu-latest
    outputs:
      available: ${{ steps.wasm-check.outputs.available }}
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      # Download WASM artifacts from the latest successful build-canvas run.
      # For PRs: downloads from the same PR's build-canvas run or falls back to base branch.
      # For pushes to main: downloads from the latest main build.
      - name: Download WASM artifacts
        id: wasm-download
        uses: dawidd6/action-download-artifact@v6
        with:
          name: canvas-wasm-artifacts
          path: crates/grida-canvas-wasm/lib/bin/
          workflow: build-canvas.yml
          branch: ${{ github.head_ref || github.ref_name }}
          if_no_artifact_found: warn
          # build-canvas may still be running — wait up to 10 minutes
          workflow_search: true
          check_artifacts: true
        continue-on-error: true

      # Fallback: try the base branch (for new PRs where no artifact exists on the head branch yet)
      - name: Fallback — download from base branch
        if: steps.wasm-download.outcome == 'failure'
        uses: dawidd6/action-download-artifact@v6
        with:
          name: canvas-wasm-artifacts
          path: crates/grida-canvas-wasm/lib/bin/
          workflow: build-canvas.yml
          branch: ${{ github.base_ref || 'main' }}
          if_no_artifact_found: warn
        continue-on-error: true

      # Fallback: download from npm if no artifact found anywhere
      - name: Fallback — download WASM from npm
        if: ${{ !hashFiles('crates/grida-canvas-wasm/lib/bin/grida_canvas_wasm.wasm') }}
        run: bash crates/grida-canvas-wasm/scripts/ensure-wasm.sh --tag canary
        continue-on-error: true

      - name: Check WASM availability
        id: wasm-check
        run: |
          if [ -f crates/grida-canvas-wasm/lib/bin/grida_canvas_wasm.wasm ]; then
            echo "available=true" >> "$GITHUB_OUTPUT"
          else
            echo "available=false" >> "$GITHUB_OUTPUT"
            echo "::warning::WASM artifacts not found — canvas-wasm, editor, and refig tests will be skipped"
          fi

      - name: Upload WASM for test job
        if: steps.wasm-check.outputs.available == 'true'
        uses: actions/upload-artifact@v4
        with:
          name: wasm-for-tests
          path: |
            crates/grida-canvas-wasm/lib/bin/grida-canvas-wasm.js
            crates/grida-canvas-wasm/lib/bin/grida_canvas_wasm.wasm
          retention-days: 1

  test:
    needs: wait-for-wasm
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4
        with:
          lfs: true

      - name: Download WASM artifacts
        if: needs.wait-for-wasm.outputs.available == 'true'
        uses: actions/download-artifact@v4
        with:
          name: wasm-for-tests
          path: crates/grida-canvas-wasm/lib/bin/

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version-file: .nvmrc
          cache: pnpm
      - name: Install Dependencies
        run: pnpm install --frozen-lockfile
      - name: Build Packages
        run: pnpm turbo build --filter='./packages/*'

      - name: Build Canvas WASM Package
        if: needs.wait-for-wasm.outputs.available == 'true'
        run: pnpm turbo build --filter='@grida/canvas-wasm'

      - name: Run Typecheck
        run: pnpm typecheck

      - name: Run Lint
        run: pnpm turbo lint

      - name: Run Tests
        run: |
          if [ "${{ needs.wait-for-wasm.outputs.available }}" == "true" ]; then
            pnpm turbo test --filter='!./crates/*'
          else
            pnpm turbo test --filter='!./crates/*' --filter='!@grida/canvas-wasm' --filter='!editor' --filter='!@grida/refig'
          fi

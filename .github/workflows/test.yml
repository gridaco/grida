name: test packages

on:
  push:
    branches:
      - main
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4
        with:
          lfs: true
      - name: Setup pnpm
        uses: pnpm/action-setup@v4
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version-file: .nvmrc
          cache: pnpm
      - name: Install Dependencies
        run: pnpm install --frozen-lockfile
      - name: Build Packages
        run: pnpm turbo build --filter='./packages/*'
      # Build the @grida/canvas-wasm TypeScript wrapper only (tsup).
      # The pre-compiled .wasm binary and Emscripten glue (.js) live in
      # crates/grida-canvas-wasm/lib/bin/ and are checked in via Git LFS
      # (fetched above). No Rust/Emscripten toolchain is needed here.
      # tsup copies lib/bin/ into dist/ and emits dist/index.d.ts, which
      # is what the editor typecheck depends on.
      - name: Build Canvas WASM Package
        run: pnpm turbo build --filter='@grida/canvas-wasm'
      - name: Run Typecheck
        run: pnpm typecheck
      - name: Run Lint
        run: pnpm lint
      - name: Run Tests
        run: pnpm turbo test --filter='!./crates/*'

name: test packages

on:
  push:
    branches:
      - main
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      # Download pre-built WASM artifacts from the latest successful
      # build-canvas.yml run instead of checking them in via Git LFS.
      - name: Download WASM artifacts
        id: wasm-download
        uses: dawidd6/action-download-artifact@v6
        with:
          name: canvas-wasm-artifacts
          path: crates/grida-canvas-wasm/lib/bin/
          workflow: build-canvas.yml
          branch: main
          if_no_artifact_found: warn
        continue-on-error: true

      - name: Check WASM availability
        id: wasm-check
        run: |
          if [ -f crates/grida-canvas-wasm/lib/bin/grida_canvas_wasm.wasm ]; then
            echo "available=true" >> "$GITHUB_OUTPUT"
          else
            echo "available=false" >> "$GITHUB_OUTPUT"
            echo "::warning::WASM artifacts not found — canvas-wasm tests will be skipped"
          fi

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version-file: .nvmrc
          cache: pnpm
      - name: Install Dependencies
        run: pnpm install --frozen-lockfile
      - name: Build Packages
        run: pnpm turbo build --filter='./packages/*'

      # Build the @grida/canvas-wasm TypeScript wrapper (tsup).
      # When WASM artifacts are present, tsup copies them into dist/ via
      # publicDir. When absent, dist/ still gets index.d.ts which is
      # sufficient for typecheck.
      - name: Build Canvas WASM Package
        if: steps.wasm-check.outputs.available == 'true'
        run: pnpm turbo build --filter='@grida/canvas-wasm'

      # Typecheck works even without WASM binaries — tsc only needs
      # dist/index.d.ts which tsup emits from lib/index.ts alone.
      - name: Run Typecheck
        run: pnpm typecheck

      - name: Run Lint
        run: pnpm turbo lint

      # Exclude canvas-wasm tests when WASM binaries are not available.
      - name: Run Tests
        run: |
          if [ "${{ steps.wasm-check.outputs.available }}" == "true" ]; then
            pnpm turbo test --filter='!./crates/*'
          else
            pnpm turbo test --filter='!./crates/*' --filter='!@grida/canvas-wasm'
          fi

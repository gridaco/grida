name: canvas build

on:
  workflow_dispatch:
  push:
    branches:
      - main
      - canary
  pull_request:

concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 2
          submodules: recursive

      - name: Check for crate changes
        id: changes
        run: |
          if git diff --name-only HEAD~1 -- crates/ .github/workflows/build-canvas.yml .github/workflows/publish-canvas-wasm.yml | grep -q .; then
            echo "changed=true" >> "$GITHUB_OUTPUT"
            echo "Crate or workflow changes detected — will build WASM"
          else
            echo "changed=false" >> "$GITHUB_OUTPUT"
            echo "No crate changes — will re-upload last artifact"
          fi

      # --- Fast path: no crate changes, re-upload existing artifact ---

      - name: Download previous WASM artifact
        if: steps.changes.outputs.changed == 'false'
        uses: dawidd6/action-download-artifact@v6
        with:
          name: canvas-wasm-artifacts
          path: crates/grida-canvas-wasm/lib/bin/
          workflow: build-canvas.yml
          branch: ${{ github.event.pull_request.base.ref || github.ref_name }}
          if_no_artifact_found: warn
        continue-on-error: true

      # --- Full build path: crate changes detected ---

      - name: Setup pnpm
        if: steps.changes.outputs.changed == 'true'
        uses: pnpm/action-setup@v4

      - name: Setup Node.js
        if: steps.changes.outputs.changed == 'true'
        uses: actions/setup-node@v4
        with:
          node-version-file: .nvmrc
          cache: pnpm

      - name: Install system dependencies
        if: steps.changes.outputs.changed == 'true'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            build-essential \
            cmake \
            ninja-build \
            just

      - name: Setup Rust toolchain
        if: steps.changes.outputs.changed == 'true'
        uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: 1.92.0

      - name: Add wasm32-unknown-emscripten target
        if: steps.changes.outputs.changed == 'true'
        run: rustup target add wasm32-unknown-emscripten

      - name: Cache cargo build outputs
        if: steps.changes.outputs.changed == 'true'
        uses: Swatinem/rust-cache@v2
        with:
          key: wasm32-unknown-emscripten

      - name: Install workspace dependencies for @grida/canvas-wasm
        if: steps.changes.outputs.changed == 'true'
        run: pnpm install --filter "@grida/canvas-wasm..." --frozen-lockfile

      - name: Install Emscripten SDK
        if: steps.changes.outputs.changed == 'true'
        run: python3 bin/activate-emsdk

      - name: Fix missing xlocale.h header for Emscripten
        if: steps.changes.outputs.changed == 'true'
        run: |
          sudo ln -s /usr/include/locale.h /usr/include/xlocale.h

      - name: Build canvas wasm artifacts
        if: steps.changes.outputs.changed == 'true'
        run: just build
        working-directory: crates/grida-canvas-wasm

      # --- Always upload (new build or re-uploaded previous) ---

      - name: Upload WASM artifacts
        uses: actions/upload-artifact@v4
        with:
          name: canvas-wasm-artifacts
          path: |
            crates/grida-canvas-wasm/lib/bin/grida-canvas-wasm.js
            crates/grida-canvas-wasm/lib/bin/grida_canvas_wasm.wasm
          retention-days: 30

name: canvas build

on:
  workflow_dispatch:
  push:
    branches:
      - main
  pull_request:
    paths:
      - ".github/workflows/**"
      - "crates/**"

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Setup pnpm
        uses: pnpm/action-setup@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version-file: .nvmrc
          cache: pnpm

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            build-essential \
            cmake \
            ninja-build \
            just

      - name: Setup Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: 1.92.0

      - name: Add wasm32-unknown-emscripten target
        run: rustup target add wasm32-unknown-emscripten

      - name: Cache cargo build outputs
        uses: Swatinem/rust-cache@v2
        with:
          key: wasm32-unknown-emscripten

      # Full install (not filtered). The canvas-wasm vitest suite imports
      # from packages/grida-canvas-io (source path), which transitively
      # depends on @grida/schema, @grida/cg, @grida/cmath, @grida/format,
      # @grida/sequence. A --filter install scoped to @grida/canvas-wasm
      # misses those because canvas-wasm's own package.json has no deps.
      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Install Emscripten SDK
        run: python3 bin/activate-emsdk

      - name: Fix missing xlocale.h header for Emscripten
        run: |
          sudo ln -s /usr/include/locale.h /usr/include/xlocale.h

      - name: Build canvas wasm artifacts
        run: just build
        working-directory: crates/grida-canvas-wasm

      # Build the one package the wasm vitest imports — turbo pulls its
      # workspace deps (@grida/schema, cg, cmath, format, sequence).
      - name: Build workspace packages for tests
        run: pnpm turbo build --filter=@grida/io

      - name: Run canvas wasm smoke test
        run: pnpm --filter @grida/canvas-wasm test

name: canvas build

on:
  workflow_dispatch:
  workflow_call:
  push:
    branches:
      - main
      - canary
    paths:
      - "crates/**"
      - ".github/workflows/build-canvas.yml"
      - ".github/workflows/publish-canvas-wasm.yml"

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Setup pnpm
        uses: pnpm/action-setup@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version-file: .nvmrc
          cache: pnpm

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            build-essential \
            cmake \
            ninja-build \
            just

      - name: Setup Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: 1.92.0

      - name: Add wasm32-unknown-emscripten target
        run: rustup target add wasm32-unknown-emscripten

      - name: Cache cargo build outputs
        uses: Swatinem/rust-cache@v2
        with:
          key: wasm32-unknown-emscripten

      - name: Install workspace dependencies for @grida/canvas-wasm
        run: pnpm install --filter "@grida/canvas-wasm..." --frozen-lockfile

      - name: Install Emscripten SDK
        run: python3 bin/activate-emsdk

      - name: Fix missing xlocale.h header for Emscripten
        run: |
          sudo ln -s /usr/include/locale.h /usr/include/xlocale.h

      - name: Build canvas wasm artifacts
        run: just build
        working-directory: crates/grida-canvas-wasm

      - name: Upload WASM artifacts
        uses: actions/upload-artifact@v7
        with:
          name: canvas-wasm-artifacts
          path: |
            crates/grida-canvas-wasm/lib/bin/grida-canvas-wasm.js
            crates/grida-canvas-wasm/lib/bin/grida_canvas_wasm.wasm
          retention-days: 30

  # Publish to npm after a successful build on main or canary.
  # Skipped for workflow_call (test-canvas.yml) and PRs — only runs on push/dispatch.
  publish:
    needs: build
    if: >-
      github.event_name != 'pull_request' &&
      (github.event_name == 'push' || github.event_name == 'workflow_dispatch')
    runs-on: ubuntu-latest
    environment: npm-publish
    permissions:
      contents: write
      id-token: write
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "24"
          cache: pnpm
          registry-url: "https://registry.npmjs.org"

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Download WASM artifacts
        uses: actions/download-artifact@v8
        with:
          name: canvas-wasm-artifacts
          path: crates/grida-canvas-wasm/lib/bin/

      - name: Build package (tsup)
        run: pnpm turbo build --filter='@grida/canvas-wasm'

      - name: Verify dist contents
        run: |
          test -f crates/grida-canvas-wasm/dist/grida_canvas_wasm.wasm || { echo "::error::Missing grida_canvas_wasm.wasm in dist"; exit 1; }
          test -f crates/grida-canvas-wasm/dist/grida-canvas-wasm.js || { echo "::error::Missing grida-canvas-wasm.js in dist"; exit 1; }
          test -f crates/grida-canvas-wasm/dist/index.js || { echo "::error::Missing index.js in dist"; exit 1; }
          ls -lh crates/grida-canvas-wasm/dist/

      - name: Determine version and tag
        working-directory: crates/grida-canvas-wasm
        run: |
          BRANCH="${{ github.ref_name }}"
          CURRENT=$(node -p "require('./package.json').version")
          BASE=$(echo "$CURRENT" | sed 's/-canary.*//')
          SHORT_SHA=$(echo "${{ github.sha }}" | cut -c1-7)

          if [ "$BRANCH" == "canary" ]; then
            VERSION="${BASE}-canary.${SHORT_SHA}"
            TAG=canary
          else
            MAJOR=$(echo "$BASE" | cut -d. -f1)
            MINOR=$(echo "$BASE" | cut -d. -f2)
            PATCH=$(echo "$BASE" | cut -d. -f3)
            VERSION="${MAJOR}.${MINOR}.$((PATCH + 1))"
            TAG=latest
          fi

          npm version "$VERSION" --no-git-tag-version
          echo "VERSION=$VERSION" >> "$GITHUB_ENV"
          echo "TAG=$TAG" >> "$GITHUB_ENV"
          echo "Publishing @grida/canvas-wasm@$VERSION with tag $TAG"

      - name: Publish to npm
        working-directory: crates/grida-canvas-wasm
        run: pnpm publish --tag ${{ env.TAG }} --access public --provenance --no-git-checks

      - name: Commit version bump (stable only)
        if: env.TAG == 'latest'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add crates/grida-canvas-wasm/package.json
          git commit -m "chore: release @grida/canvas-wasm@${{ env.VERSION }}"
          git push

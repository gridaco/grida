permissions:
  contents: write

name: Publish Desktop App

on:
  workflow_dispatch:
    inputs:
      prerelease:
        description: "Publish as prerelease (autoupdate skips prereleases by default)"
        required: false
        type: boolean
        default: false

jobs:
  build:
    environment: release
    strategy:
      fail-fast: false
      matrix:
        os:
          - name: linux
            image: ubuntu-latest
          - name: windows
            image: windows-latest
          - name: macos-apple-silicon
            image: macos-26
    runs-on: ${{ matrix.os.image }}
    env:
      HAS_SIGNING: ${{ secrets.APPLE_CERTIFICATE_P12 != '' && secrets.APPLE_CERTIFICATE_PASSWORD != '' && secrets.APPLE_SIGNING_IDENTITY != '' }}
      HAS_NOTARIZE: ${{ secrets.APPLE_API_KEY_P8 != '' && secrets.APPLE_API_KEY_ID != '' && secrets.APPLE_API_ISSUER != '' }}
    defaults:
      run:
        working-directory: ./desktop

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Install Snapcraft (Ubuntu only)
        if: ${{ matrix.os.name == 'linux' }}
        run: |
          sudo apt update
          sudo apt install snapd
          sudo snap install snapcraft --classic

      - name: Setup pnpm
        uses: pnpm/action-setup@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version-file: .nvmrc
          cache: pnpm

      - name: Install Dependencies
        run: pnpm install --frozen-lockfile

      - name: Build linked workspace packages
        # The isolated ./desktop pnpm project `link:`s several @grida/*
        # workspace packages whose dist/ is gitignored and is therefore
        # absent on a clean checkout. The desktop Vite build resolves and
        # bundles them from source-built dist/ — without this they can't be
        # resolved and (per desktop/vite.guards.ts, GRIDA-DESKTOP-BUILD-GUARD)
        # the build now hard-fails instead of shipping a binary that crashes
        # on launch. Build the closure from the repo root so the link:
        # targets have dist/ before packaging. --ignore-scripts skips native
        # postinstalls we don't need (these are pure tsdown packages, no wasm).
        # `shell: bash` so the `\` line-continuations work on Windows too —
        # the default Windows shell is PowerShell, where `\` is not a
        # continuation and `--filter` parses as a unary operator.
        working-directory: ${{ github.workspace }}
        shell: bash
        run: |
          pnpm install --frozen-lockfile --ignore-scripts
          pnpm turbo run build \
            --filter=@grida/desktop-bridge \
            --filter=@grida/agent \
            --filter=@grida/ai-models \
            --filter=@grida/home

      - name: Import Apple signing certificate
        if: ${{ matrix.os.name == 'macos-apple-silicon' && env.HAS_SIGNING == 'true' }}
        uses: apple-actions/import-codesign-certs@v2
        with:
          keychain: build
          p12-file-base64: ${{ secrets.APPLE_CERTIFICATE_P12 }}
          p12-password: ${{ secrets.APPLE_CERTIFICATE_PASSWORD }}

      - name: Stage App Store Connect API key
        if: ${{ matrix.os.name == 'macos-apple-silicon' && env.HAS_NOTARIZE == 'true' }}
        shell: bash
        env:
          APPLE_API_KEY_P8: ${{ secrets.APPLE_API_KEY_P8 }}
          APPLE_API_KEY_ID: ${{ secrets.APPLE_API_KEY_ID }}
        run: |
          DIR="$RUNNER_TEMP/keys"
          mkdir -p "$DIR"
          KEY_PATH="$DIR/AuthKey_${APPLE_API_KEY_ID}.p8"
          printf '%s' "$APPLE_API_KEY_P8" > "$KEY_PATH"
          echo "APPLE_API_KEY=$KEY_PATH" >> "$GITHUB_ENV"

      - name: Publish App (Windows)
        if: ${{ matrix.os.name == 'windows' }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          PRERELEASE: ${{ inputs.prerelease }}
        run: pnpm run publish:prerelease --arch="x64"

      - name: Publish App (Linux)
        if: ${{ matrix.os.name == 'linux' }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          PRERELEASE: ${{ inputs.prerelease }}
        run: pnpm run publish:prerelease --arch="x64,arm64"

      - name: Publish App (MacOS)
        if: ${{ matrix.os.name == 'macos-apple-silicon' && env.HAS_SIGNING == 'true' && env.HAS_NOTARIZE == 'true' }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          PRERELEASE: ${{ inputs.prerelease }}
          APPLE_SIGNING_IDENTITY: ${{ secrets.APPLE_SIGNING_IDENTITY }}
          APPLE_API_KEY_ID: ${{ secrets.APPLE_API_KEY_ID }}
          APPLE_API_ISSUER: ${{ secrets.APPLE_API_ISSUER }}
        run: pnpm run publish:prerelease --arch="arm64"

      - name: Update release notes from template
        # Runs once (gated to the linux row, which has no signing-secret
        # dependency and therefore always runs). The release tag will exist
        # by this point since linux's publish step ran just above.
        # Template at .github/release-notes/desktop.md.
        if: ${{ matrix.os.name == 'linux' }}
        working-directory: ${{ github.workspace }}
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          VERSION=$(node -p "require('./desktop/package.json').version")
          TAG="v${VERSION}"
          BODY=$(sed "s|{{version}}|${VERSION}|g" .github/release-notes/desktop.md)
          gh release edit "$TAG" --notes "$BODY" --repo gridaco/grida

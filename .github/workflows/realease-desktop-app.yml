permissions:
  contents: read

name: Publish Desktop App

concurrency:
  # One release workflow may assemble drafts at a time. Platform builds remain
  # parallel within the run; release mutation has one owner in the final job.
  group: desktop-release
  cancel-in-progress: false

on:
  workflow_dispatch:
    inputs:
      prerelease:
        description: "Publish as prerelease (autoupdate skips prereleases by default)"
        required: false
        type: boolean
        default: false

jobs:
  guard:
    name: Require main branch
    runs-on: ubuntu-latest
    steps:
      - name: Reject non-main releases
        if: ${{ github.ref != 'refs/heads/main' }}
        shell: bash
        run: |
          echo "::error::Desktop releases must be dispatched from main"
          exit 1

  build:
    name: Build (${{ matrix.os.name }})
    needs: guard
    environment: release
    strategy:
      fail-fast: false
      matrix:
        os:
          - name: linux
            image: ubuntu-latest
            arch: x64,arm64
          - name: windows
            image: windows-latest
            arch: x64
          # macOS builds one arch per runner ON PURPOSE (issue #947): a single
          # parallel --arch="x64,arm64" invocation hits the maker-dmg race
          # (electron/forge#3517 — hdiutil EAGAIN + appdmg "Target already
          # exists"), fixed only in Forge 8 (GA tracker: electron/forge#4082).
          # Native per-arch runners also make pnpm resolve the per-platform
          # native prebuilds (e.g. @parcel/watcher-darwin-<arch>) correctly.
          - name: macos-apple-silicon
            image: macos-26
            arch: arm64
            mac_arch: arm64
          - name: macos-intel
            # GitHub's LAST x86_64 macOS image — retired Aug 2027
            # (actions/runner-images#13045). When it dies, either Forge 8 GA
            # has fixed the parallel-arch DMG race or we re-drop Intel.
            image: macos-15-intel
            arch: x64
            mac_arch: x64
    runs-on: ${{ matrix.os.image }}
    env:
      HAS_SIGNING: ${{ secrets.APPLE_CERTIFICATE_P12 != '' && secrets.APPLE_CERTIFICATE_PASSWORD != '' && secrets.APPLE_SIGNING_IDENTITY != '' }}
      HAS_NOTARIZE: ${{ secrets.APPLE_API_KEY_P8 != '' && secrets.APPLE_API_KEY_ID != '' && secrets.APPLE_API_ISSUER != '' }}
    defaults:
      run:
        working-directory: ./desktop

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Require Apple release credentials
        if: ${{ matrix.os.mac_arch && (env.HAS_SIGNING != 'true' || env.HAS_NOTARIZE != 'true') }}
        shell: bash
        run: |
          echo "::error::macOS release builds require signing and notarization credentials"
          exit 1

      - name: Setup pnpm
        uses: pnpm/action-setup@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version-file: .nvmrc
          cache: pnpm

      - name: Install Dependencies
        run: pnpm install --frozen-lockfile

      - name: Build linked workspace packages
        # The isolated ./desktop pnpm project `link:`s several @grida/*
        # workspace packages whose dist/ is gitignored and is therefore
        # absent on a clean checkout. The desktop Vite build resolves and
        # bundles them from source-built dist/ — without this they can't be
        # resolved and (per desktop/vite.guards.ts, GRIDA-DESKTOP-BUILD-GUARD)
        # the build now hard-fails instead of shipping a binary that crashes
        # on launch. Build the closure from the repo root so the link:
        # targets have dist/ before packaging. --ignore-scripts skips native
        # postinstalls we don't need (these are pure tsdown packages, no wasm).
        # `shell: bash` so the `\` line-continuations work on Windows too —
        # the default Windows shell is PowerShell, where `\` is not a
        # continuation and `--filter` parses as a unary operator.
        working-directory: ${{ github.workspace }}
        shell: bash
        run: |
          pnpm install --frozen-lockfile --ignore-scripts
          pnpm turbo run build \
            --filter=@grida/desktop-bridge \
            --filter=@grida/agent \
            --filter=@grida/daemon \
            --filter=@grida/ai-models \
            --filter=@grida/home

      - name: Import Apple signing certificate
        if: ${{ matrix.os.mac_arch && env.HAS_SIGNING == 'true' }}
        uses: apple-actions/import-codesign-certs@v2
        with:
          keychain: build
          p12-file-base64: ${{ secrets.APPLE_CERTIFICATE_P12 }}
          p12-password: ${{ secrets.APPLE_CERTIFICATE_PASSWORD }}

      - name: Stage App Store Connect API key
        if: ${{ matrix.os.mac_arch && env.HAS_NOTARIZE == 'true' }}
        shell: bash
        env:
          APPLE_API_KEY_P8: ${{ secrets.APPLE_API_KEY_P8 }}
          APPLE_API_KEY_ID: ${{ secrets.APPLE_API_KEY_ID }}
        run: |
          DIR="$RUNNER_TEMP/keys"
          mkdir -p "$DIR"
          KEY_PATH="$DIR/AuthKey_${APPLE_API_KEY_ID}.p8"
          printf '%s' "$APPLE_API_KEY_P8" > "$KEY_PATH"
          echo "APPLE_API_KEY=$KEY_PATH" >> "$GITHUB_ENV"

      - name: Make App
        if: ${{ !matrix.os.mac_arch }}
        run: pnpm run make --arch="${{ matrix.os.arch }}"

      - name: Make App (MacOS)
        if: ${{ matrix.os.mac_arch }}
        env:
          APPLE_SIGNING_IDENTITY: ${{ secrets.APPLE_SIGNING_IDENTITY }}
          APPLE_API_KEY_ID: ${{ secrets.APPLE_API_KEY_ID }}
          APPLE_API_ISSUER: ${{ secrets.APPLE_API_ISSUER }}
        # One arch per runner (matrix.os.mac_arch) — see the matrix comment.
        run: pnpm run make --arch="${{ matrix.os.arch }}"

      - name: Upload distributables
        uses: actions/upload-artifact@v4
        with:
          name: desktop-release-${{ matrix.os.name }}
          path: desktop/out/make
          if-no-files-found: error
          compression-level: 0
          retention-days: 7

  release:
    name: Assemble draft release
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4
        with:
          persist-credentials: false

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version-file: .nvmrc

      - name: Download distributables
        uses: actions/download-artifact@v4
        with:
          pattern: desktop-release-*
          path: ${{ runner.temp }}/desktop-release
          merge-multiple: false

      - name: Test release assembler
        run: node --test .github/scripts/assemble-desktop-release.test.mjs

      - name: Assemble verified draft release
        env:
          DESKTOP_RELEASE_ASSETS_DIR: ${{ runner.temp }}/desktop-release
          DESKTOP_RELEASE_PRERELEASE: ${{ inputs.prerelease }}
          GITHUB_TOKEN: ${{ github.token }}
        run: node .github/scripts/assemble-desktop-release.mjs

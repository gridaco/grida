name: Publish @grida/canvas-wasm

# Manual re-publish only. Automatic publishing is handled by build-canvas.yml's
# publish job (same workflow run, no cross-run artifact resolution needed).
#
# Use this to manually re-publish from the latest successful build on a branch.
on:
  workflow_dispatch:
    inputs:
      dry_run:
        description: "Dry run (skip npm publish)"
        type: boolean
        default: false
      tag:
        description: "npm dist-tag override"
        type: choice
        options:
          - auto
          - canary
          - latest
        default: auto

jobs:
  publish:
    runs-on: ubuntu-latest
    environment: npm-publish
    permissions:
      contents: write
      id-token: write
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "24"
          cache: pnpm
          registry-url: "https://registry.npmjs.org"

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Resolve latest build run
        id: resolve-run
        run: |
          RUN_ID=$(gh run list \
            --workflow=build-canvas.yml \
            --branch="${{ github.ref_name }}" \
            --status=success \
            --limit=1 \
            --json databaseId \
            --jq '.[0].databaseId')
          if [ -z "$RUN_ID" ]; then
            echo "::error::No successful canvas build found on ${{ github.ref_name }}"
            exit 1
          fi
          echo "run_id=$RUN_ID" >> "$GITHUB_OUTPUT"
          echo "Using artifacts from build-canvas.yml run $RUN_ID"
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Download WASM artifacts
        uses: actions/download-artifact@v8
        with:
          name: canvas-wasm-artifacts
          path: crates/grida-canvas-wasm/lib/bin/
          run-id: ${{ steps.resolve-run.outputs.run_id }}
          github-token: ${{ secrets.GITHUB_TOKEN }}

      - name: Build package (tsup)
        run: pnpm turbo build --filter='@grida/canvas-wasm'

      - name: Verify dist contents
        run: |
          test -f crates/grida-canvas-wasm/dist/grida_canvas_wasm.wasm || { echo "::error::Missing grida_canvas_wasm.wasm in dist"; exit 1; }
          test -f crates/grida-canvas-wasm/dist/grida-canvas-wasm.js || { echo "::error::Missing grida-canvas-wasm.js in dist"; exit 1; }
          test -f crates/grida-canvas-wasm/dist/index.js || { echo "::error::Missing index.js in dist"; exit 1; }
          ls -lh crates/grida-canvas-wasm/dist/

      - name: Determine version and tag
        working-directory: crates/grida-canvas-wasm
        run: |
          BRANCH="${{ github.ref_name }}"
          CURRENT=$(node -p "require('./package.json').version")
          BASE=$(echo "$CURRENT" | sed 's/-canary.*//')
          SHORT_SHA=$(echo "${{ github.sha }}" | cut -c1-7)

          if [ "$BRANCH" == "canary" ]; then
            VERSION="${BASE}-canary.${SHORT_SHA}"
            TAG=canary
          else
            MAJOR=$(echo "$BASE" | cut -d. -f1)
            MINOR=$(echo "$BASE" | cut -d. -f2)
            PATCH=$(echo "$BASE" | cut -d. -f3)
            VERSION="${MAJOR}.${MINOR}.$((PATCH + 1))"
            TAG=latest
          fi

          # Allow manual tag override
          INPUT_TAG="${{ inputs.tag }}"
          if [ -n "$INPUT_TAG" ] && [ "$INPUT_TAG" != "auto" ]; then
            TAG="$INPUT_TAG"
          fi

          npm version "$VERSION" --no-git-tag-version
          echo "VERSION=$VERSION" >> "$GITHUB_ENV"
          echo "TAG=$TAG" >> "$GITHUB_ENV"
          echo "Publishing @grida/canvas-wasm@$VERSION with tag $TAG"

      - name: Publish to npm
        if: ${{ !inputs.dry_run }}
        working-directory: crates/grida-canvas-wasm
        run: pnpm publish --tag ${{ env.TAG }} --access public --provenance --no-git-checks

      - name: Publish to npm (dry run)
        if: ${{ inputs.dry_run }}
        working-directory: crates/grida-canvas-wasm
        run: |
          echo "DRY RUN — would publish @grida/canvas-wasm@${{ env.VERSION }} with tag ${{ env.TAG }}"
          pnpm publish --tag ${{ env.TAG }} --access public --provenance --no-git-checks --dry-run

      - name: Commit version bump (stable only)
        if: env.TAG == 'latest' && !inputs.dry_run
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add crates/grida-canvas-wasm/package.json
          git commit -m "chore: release @grida/canvas-wasm@${{ env.VERSION }}"
          git push

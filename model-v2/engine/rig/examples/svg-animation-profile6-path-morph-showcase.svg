  <rect x="492" y="52" width="416" height="204" rx="22" fill="#171f31"/>
  <rect x="492" y="276" width="416" height="212" rx="22" fill="#171f31"/>

  <rect x="76" y="76" width="74" height="8" rx="4" fill="#7c3aed"/>
